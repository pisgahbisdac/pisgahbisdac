<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Sistem Kehadiran Jemaat - PISGAH BISDAC</title>
    <link rel="icon" type="image/png" href="PisgahWhite.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body class="antialiased min-h-screen relative overflow-x-hidden">
    <div class="fixed inset-0 bg-[#040712] overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-blue-900/15 blur-[140px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-amber-500/10 blur-[140px]"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwW-Km_huyHl-RZ18MSjVXTF46bNJGDb634-hqqhGCwRgV2VsCqx6vG3dmQSqStJhE-/exec";

        const KEGIATAN_KETERLIBATAN = [
            { id: 1, text: "Jumlah Anggota yang datang tepat waktu di Kebaktian Sekolah Sabat", autoFill: true },
            { id: 2, text: "Jumlah Anggota yang membaca Alkitab setiap hari", autoFill: false },
            { id: 3, text: "Jumlah Anggota yang Renungan Pagi setiap hari", autoFill: false },
            { id: 4, text: "Jumlah Anggota yang Belajar Sekolah Sabat setiap hari", autoFill: false },
            { id: 5, text: "Jumlah Anggota yang hadir di Kebaktian Rabu Malam", autoFill: false },
            { id: 6, text: "Jumlah Anggota yang melakukan Jangkauan Keluar (Discipleship)", autoFill: false },
            { id: 7, text: "Jumlah Anggota yang melakukan Perawatan Pemeliharaan (Nurturing & Reclaiming)", autoFill: false },
            { id: 8, text: "Jumlah Anggota yang melakukan Doa (777, 1752 & Doa Subuh)", autoFill: false },
            { id: 9, text: "Jumlah Anggota yang terlibat/mengadakan kegiatan Kelompok Kecil", autoFill: false },
            { id: 10, text: "Jumlah Anggota yang membagikan risalah, buku rohani, kursus Alkitab tertulis.", autoFill: false }
        ];

        // ─── Utility Functions ────────────────────────────────────────────────────

        const cleanDateString = (dateInput) => {
            if (!dateInput) return "";
            if (typeof dateInput === 'string') {
                if (dateInput.includes('T')) return dateInput.split('T')[0];
                return dateInput;
            }
            return "";
        };

        const formatLocalYYYYMMDD = (dateObj) => {
            if (!dateObj) return "";
            const year  = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day   = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // FIX 1: fungsi ini sebelumnya tidak pernah didefinisikan → crash saat kirim doa
        const formatLocalDDMMYYYY = (dateObj) => {
            if (!dateObj) return "";
            const day   = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year  = dateObj.getFullYear();
            return `${day}/${month}/${year}`;
        };

        const maskNoHp = (noHp) => {
            if (!noHp) return "-";
            const str = String(noHp).replace(/\s/g, "");
            if (str.length <= 4) return "****";
            const visible = str.slice(0, 4);
            const end     = str.slice(-2);
            const masked  = "*".repeat(Math.max(0, str.length - 6));
            return `${visible}${masked}${end}`;
        };

        const parseLocalDate = (dateStr) => {
            if (!dateStr) return null;
            const cleaned = cleanDateString(dateStr);
            const parts   = cleaned.split('-');
            if (parts.length !== 3) return null;
            return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        };

        // FIX 2: fungsi ini dipanggil oleh getSabbatsInRange tapi tidak pernah didefinisikan
        const getSabbatsInMonth = (yearMonth) => {
            if (!yearMonth) return [];
            const [year, month] = yearMonth.split('-').map(Number);
            const sabbats = [];
            // Tentukan jumlah hari di bulan tsb
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month - 1, d);
                if (date.getDay() === 6) { // Sabtu = 6
                    sabbats.push(formatLocalYYYYMMDD(date));
                }
            }
            return sabbats;
        };

        // ─── App Component ────────────────────────────────────────────────────────

        function App() {
            const [jemaat, setJemaat]               = useState([]);
            const [kelas, setKelas]                 = useState([]);
            const [subKelas, setSubKelas]           = useState([]);
            const [users, setUsers]                 = useState([]);
            const [absen, setAbsen]                 = useState([]);
            const [keterlibatan, setKeterlibatan]   = useState([]);
            const [tamuTambahan, setTamuTambahan]   = useState([]);
            const [doaList, setDoaList]             = useState([]);
            const [adminPin, setAdminPin]           = useState("admin123");

            const [showAdminPinForm, setShowAdminPinForm] = useState(false);
            const [showUserModalPin, setShowUserModalPin] = useState(false);
            const [logoError, setLogoError]         = useState(false);
            const [isSyncing, setIsSyncing]         = useState(false);

            const [currentUserRole, setCurrentUserRole] = useState("public");
            const [loggedInUser, setLoggedInUser]   = useState(null);
            const [adminPassword, setAdminPassword] = useState("");
            const [activeTab, setActiveTab]         = useState("dashboard");
            const [authError, setAuthError]         = useState("");
            const [showLoginPassword, setShowLoginPassword] = useState(false);

            const [jemaatModal, setJemaatModal] = useState({ isOpen: false, mode: 'create', data: null });
            const [kelasModal,  setKelasModal]  = useState({ isOpen: false, mode: 'create', data: null, type: 'kelas' });
            const [userModal,   setUserModal]   = useState({ isOpen: false, mode: 'create', data: null });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: "", message: "", onConfirm: null });

            const [searchJemaat,  setSearchJemaat]  = useState("");
            const [filterKelas,   setFilterKelas]   = useState("all");
            const [filterGender,  setFilterGender]  = useState("all");
            const [filterBaptis,  setFilterBaptis]  = useState("all");
            const [sortBy,    setSortBy]    = useState("nama");
            const [sortOrder, setSortOrder] = useState("asc");

            const getTodayString = () => formatLocalYYYYMMDD(new Date());
            const [selectedSabbatDate,   setSelectedSabbatDate]   = useState(getTodayString());
            const [absenDraft,           setAbsenDraft]           = useState({});
            const [selectedSubKelasNama, setSelectedSubKelasNama] = useState("");
            const [selectedSession,      setSelectedSession]      = useState("Sekolah Sabat");
            const [schoolSabbatSubTab,   setSchoolSabbatSubTab]   = useState("absen-jemaat");
            const [keterlibatanDraft,    setKeterlibatanDraft]    = useState({});
            const [tamuDraft,            setTamuDraft]            = useState(0);
            const [searchSermonJemaat,   setSearchSermonJemaat]   = useState("");

            const [reportMonth,         setReportMonth]         = useState("2026-05");
            const [reportKelasFilter,   setReportKelasFilter]   = useState("all");
            const [reportSession,       setReportSession]       = useState("Sekolah Sabat");
            const [reportType,          setReportType]          = useState("presensi");
            const [reportSubKelasFilter,setReportSubKelasFilter]= useState("");
            const [reportMonthEnd,      setReportMonthEnd]      = useState("2026-05");
            const [isMultiMonth,        setIsMultiMonth]        = useState(false);

            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 4000);
            };

            const triggerConfirm = (title, message, onConfirmCallback) => {
                setConfirmModal({
                    isOpen: true, title, message,
                    onConfirm: () => {
                        onConfirmCallback();
                        setConfirmModal({ isOpen: false, title: "", message: "", onConfirm: null });
                    }
                });
            };

            const ultahBulanIni = useMemo(() => {
                const currentMonth = new Date().getMonth() + 1;
                return jemaat.filter(j => {
                    if (!j.tglLahir) return false;
                    const parts = j.tglLahir.split('-');
                    return parts.length === 3 && parseInt(parts[1]) === currentMonth;
                }).sort((a, b) => parseInt(a.tglLahir.split('-')[2]) - parseInt(b.tglLahir.split('-')[2]));
            }, [jemaat]);

            const pushDataToCloud = async (overrideData = {}, overrideAdminPin = null) => {
                if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("ISI_DENGAN_URL")) return;
                setIsSyncing(true);
                showToast("Menyimpan ke Cloud...", "info");
                try {
                    const activeAdminPin = overrideAdminPin !== null ? overrideAdminPin : adminPin;
                    const payload = {};

                    if (overrideData.jemaat !== undefined)
                        payload.jemaat = overrideData.jemaat.map(j => ({ ...j, tglLahir: cleanDateString(j.tglLahir) }));

                    if (overrideData.kelas !== undefined)
                        payload.kelas = overrideData.kelas;

                    if (overrideData.subKelas !== undefined)
                        payload.subKelas = overrideData.subKelas;

                    if (overrideData.users !== undefined || overrideAdminPin !== null) {
                        payload.users = [
                            ...(overrideData.users || users),
                            { nama: "Admin Utama (Backup PIN)", subKelasNama: "Kebaktian Khotbah (Umum)", pin: activeAdminPin }
                        ];
                    }

                    if (overrideData.absen !== undefined)
                        payload.absen = overrideData.absen;

                    if (overrideData.keterlibatan !== undefined)
                        payload.keterlibatan = overrideData.keterlibatan;

                    if (overrideData.tamuTambahan !== undefined)
                        payload.tamuTambahan = overrideData.tamuTambahan;

                    if (overrideData.doaList !== undefined)
                        payload.doaList = overrideData.doaList;

                    const res = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST', redirect: 'follow',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });

                    const json = await res.json();
                    if (json.success) {
                        showToast("Data tersimpan di Database Cloud!", "success");
                    } else {
                        showToast("Gagal menyimpan: " + json.error, "error");
                    }
                } catch (err) {
                    showToast("Gagal terhubung ke Cloud. Tersimpan di lokal.", "warning");
                } finally {
                    setIsSyncing(false);
                }
            };

            const handlePullFromCloud = async (silent = false) => {
                if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("ISI_DENGAN_URL")) return;
                setIsSyncing(true);
                if (!silent) showToast("Sinkronisasi... Menarik data terbaru", "info");
                try {
                    const bypassUrl = `${APPS_SCRIPT_URL}?_=${Date.now()}`;
                    const res  = await fetch(bypassUrl);
                    const json = await res.json();
                    if (json.success && json.data) {
                        const d = json.data;
                        if (d.jemaat) {
                            setJemaat(d.jemaat.map((j, idx) => ({
                                ...j,
                                id: j.id || `J_${Date.now()}_${idx}_${Math.random().toString(36).substr(2, 4)}`,
                                tglLahir: cleanDateString(j.tglLahir)
                            })));
                        }
                        if (d.kelas)    setKelas(d.kelas);
                        if (d.subKelas) setSubKelas(d.subKelas);
                        if (d.users) {
                            const adminRecord = d.users.find(u => u.nama === "Admin Utama (Backup PIN)");
                            if (adminRecord) setAdminPin(adminRecord.pin);
                            setUsers(d.users.filter(u => u.nama !== "Admin Utama (Backup PIN)"));
                        }
                        if (d.absen) {
                            // Backend mengirim absen sebagai array flat.
                            // Baris tamu memiliki jemaatNama="Tamu Tambahan".
                            // Setelah backend dipatch, baris tamu juga membawa subKelasNama.
                            // Untuk backward-compat: jika subKelasNama tidak ada, derive dari
                            // jemaat yang ada di tanggal + sesi yang sama.
                            const rawAbsen = d.absen.map(a => ({ ...a, tanggal: cleanDateString(a.tanggal) }));

                            // Lookup: jemaat nama → subKelasNama (dari data jemaat segar)
                            const jSubMap = {};
                            if (d.jemaat) d.jemaat.forEach(j => { if (j.nama) jSubMap[j.nama] = j.subKelasNama; });

                            // Pisahkan: absen biasa vs baris tamu
                            const absenBiasa = rawAbsen.filter(a => a.jemaatNama !== "Tamu Tambahan");
                            const tamuRows   = rawAbsen.filter(a => a.jemaatNama === "Tamu Tambahan" && (parseInt(a.status) || 0) > 0);

                            // Untuk setiap baris tamu, tentukan subKelasNama:
                            //   1. Jika sesi Khotbah → selalu "Kebaktian Khotbah (Umum)"
                            //   2. Jika backend sudah mengirim subKelasNama → gunakan langsung
                            //   3. Fallback: cari subKelas mana yang punya jemaat di tanggal+sesi ini
                            //      lalu pasangkan berdasarkan urutan subKelas
                            const subKelasOrder = (d.subKelas || []).map(s => s.nama);

                            // Bangun map: tanggal+sesi → daftar subKelas yang punya jemaat (urut)
                            const activeSubs = {};
                            for (const a of absenBiasa) {
                                if (a.sesi !== "Sekolah Sabat") continue;
                                const key = a.tanggal;
                                if (!activeSubs[key]) activeSubs[key] = new Set();
                                const sub = jSubMap[a.jemaatNama];
                                if (sub) activeSubs[key].add(sub);
                            }

                            // Kelompokkan baris tamu SS per tanggal (urut sesuai kemunculan di array)
                            const tamuSSByDate = {};
                            const resolvedTamu = [];

                            for (const t of tamuRows) {
                                const jumlah = parseInt(t.status) || 0;
                                if (t.sesi === "Khotbah") {
                                    resolvedTamu.push({ tanggal: t.tanggal, sesi: "Khotbah", subKelasNama: "Kebaktian Khotbah (Umum)", jumlah });
                                } else if (t.subKelasNama && t.subKelasNama !== "_ALL_") {
                                    // Backend sudah menyertakan subKelasNama → pakai langsung
                                    resolvedTamu.push({ tanggal: t.tanggal, sesi: t.sesi, subKelasNama: t.subKelasNama, jumlah });
                                } else {
                                    // Perlu di-resolve: kumpulkan per tanggal dulu
                                    if (!tamuSSByDate[t.tanggal]) tamuSSByDate[t.tanggal] = [];
                                    tamuSSByDate[t.tanggal].push(jumlah);
                                }
                            }

                            // Resolve tamu SS yang belum ada subKelasNama-nya
                            for (const [tgl, jumlahList] of Object.entries(tamuSSByDate)) {
                                // Subkelas aktif di tanggal ini (urut sesuai urutan di subKelas sheet)
                                const activeForDate = subKelasOrder.filter(s => activeSubs[tgl] && activeSubs[tgl].has(s));

                                if (activeForDate.length === jumlahList.length) {
                                    // Cocok 1:1 — backend emit satu baris tamu per sheet sub-kelas
                                    jumlahList.forEach((jumlah, i) => {
                                        if (jumlah > 0) resolvedTamu.push({ tanggal: tgl, sesi: "Sekolah Sabat", subKelasNama: activeForDate[i], jumlah });
                                    });
                                } else {
                                    // Tidak cocok: emit satu record per subKelas aktif dengan jumlah masing-masing
                                    // (ambil jumlah pertama jika hanya ada satu, atau spread rata)
                                    activeForDate.forEach((subNama, i) => {
                                        const jumlah = jumlahList[i] !== undefined ? jumlahList[i] : jumlahList[0];
                                        if (jumlah > 0) resolvedTamu.push({ tanggal: tgl, sesi: "Sekolah Sabat", subKelasNama: subNama, jumlah });
                                    });
                                }
                            }

                            setAbsen(absenBiasa);
                            setTamuTambahan(resolvedTamu);
                        }
                        if (d.keterlibatan)
                            setKeterlibatan(d.keterlibatan.map(k => ({ ...k, tanggal: cleanDateString(k.tanggal) })));
                        // d.tamuTambahan: backend tidak mengirimnya (sudah di-embed di d.absen),
                        // jadi blok ini tidak diperlukan lagi — tamu sudah di-set di atas.
                        if (d.doaList)
    setDoaList(d.doaList.map(doa => ({
        ...doa,
        tanggal: cleanDateString(doa.tanggal) || doa.tanggal,
        permohonan: (doa.permohonan || "").replace(/ \| /g, "\n").replace(/\|/g, "\n")
    })).sort((a, b) => {
        const idA = String(a.id || "").replace("D", "");
        const idB = String(b.id || "").replace("D", "");
        return Number(idB) - Number(idA);
    }));
                        if (!silent) showToast("Sinkronisasi Berhasil!", "success");
                    }
                } catch (err) {
                    if (!silent) showToast("Gagal memuat dari Cloud.", "error");
                } finally {
                    setIsSyncing(false);
                }
            };

            useEffect(() => { if (!userModal.isOpen) setShowUserModalPin(false); }, [userModal.isOpen]);

            useEffect(() => { handlePullFromCloud(false); }, []);

            useEffect(() => {
                if (currentUserRole !== "public") handlePullFromCloud(true);
            }, [selectedSabbatDate]);

            const handleLogin = (e) => {
                e.preventDefault();
                const inputPin      = adminPassword.trim();
                const activeAdminPin = String(adminPin).trim();

                if (inputPin === activeAdminPin) {
                    setCurrentUserRole("admin"); setLoggedInUser(null);
                    setAuthError(""); setAdminPassword(""); setShowLoginPassword(false);
                    setActiveTab("dashboard");
                    showToast("Login Admin Berhasil!", "success");
                } else {
                    const matchedUser = users.find(u => String(u.pin).trim() === inputPin);
                    if (matchedUser) {
                        setCurrentUserRole("user"); setLoggedInUser(matchedUser);
                        setAuthError(""); setAdminPassword(""); setShowLoginPassword(false);
                        setSelectedSubKelasNama(matchedUser.subKelasNama);
                        setActiveTab("input-absen");
                        if (matchedUser.subKelasNama === "Kebaktian Khotbah (Umum)") {
                            showToast(`Selamat datang ${matchedUser.nama}! Anda bertugas mencatat Khotbah.`, "success");
                        } else {
                            showToast(`Selamat datang ${matchedUser.nama}! Anda bertugas di ${matchedUser.subKelasNama}.`, "success");
                        }
                    } else {
                        setAuthError("Sandi Admin atau PIN salah!"); showToast("PIN atau Sandi salah!", "error");
                    }
                }
            };

            const handleLogout = () => {
                setCurrentUserRole("public"); setLoggedInUser(null);
                setActiveTab("dashboard"); setAdminPassword(""); setShowLoginPassword(false);
                showToast("Anda telah keluar.", "info");
            };

            useEffect(() => {
                if (currentUserRole === "user" && loggedInUser) {
                    setSelectedSubKelasNama(loggedInUser.subKelasNama);
                    if (loggedInUser.subKelasNama === "Kebaktian Khotbah (Umum)") {
                        setSelectedSession("Khotbah");
                    } else {
                        setSelectedSession("Sekolah Sabat");
                    }
                } else if (subKelas.length > 0 && !selectedSubKelasNama) {
                    setSelectedSubKelasNama(subKelas[0].nama);
                }
            }, [subKelas, selectedSubKelasNama, currentUserRole, loggedInUser]);

            useEffect(() => {
                if (subKelas.length > 0 && !reportSubKelasFilter) {
                    setReportSubKelasFilter(subKelas[0].nama);
                }
            }, [subKelas, reportSubKelasFilter]);

            const isSabbat = (dateString) => {
                const date = parseLocalDate(dateString);
                return date ? date.getDay() === 6 : false;
            };

            const getSabbatsInRange = (monthStart, monthEnd, isMulti) => {
                if (!isMulti) return getSabbatsInMonth(monthStart);

                const [sy, sm] = monthStart.split('-').map(Number);
                const [ey, em] = monthEnd.split('-').map(Number);

                if (ey < sy || (ey === sy && em < sm)) return getSabbatsInMonth(monthStart);

                const sabbats = [];
                let cy = sy, cm = sm;
                while (cy < ey || (cy === ey && cm <= em)) {
                    const month = String(cm).padStart(2, '0');
                    getSabbatsInMonth(`${cy}-${month}`).forEach(s => sabbats.push(s));
                    cm++;
                    if (cm > 12) { cm = 1; cy++; }
                }
                return sabbats;
            };

            const lastSabbaths = useMemo(() => {
                const dates = [...new Set(absen.filter(a => a.sesi === "Sekolah Sabat").map(a => a.tanggal))];
                return dates.sort().slice(-5);
            }, [absen]);

            const saveJemaat = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const rawBirth  = fd.get('tglLahir');
                const subNama   = fd.get('subKelasNama');
                const subK      = subKelas.find(s => s.nama === subNama);
                const kelNama   = subK ? subK.kelasNama : (subNama === "Kebaktian Khotbah (Umum)" ? "UMUM" : (kelas[0]?.nama || ""));

                const statusJemaatArray = fd.getAll('statusJemaat');
                const statusJemaatStr   = statusJemaatArray.length > 0 ? statusJemaatArray.join(', ') : 'Jemaat';

                let generatedId;
                if (jemaatModal.mode === 'create') {
                    generatedId = "J" + Date.now().toString().slice(-4);
                } else {
                    generatedId = jemaatModal.data.id;
                }

                const newJemaatData = {
                    id: generatedId,
                    nama: fd.get('nama').trim(),
                    gender: fd.get('gender'),
                    tglLahir: cleanDateString(rawBirth),
                    statusBaptis: fd.get('statusBaptis'),
                    statusJemaat: statusJemaatStr,
                    kelasNama: kelNama,
                    subKelasNama: subNama,
                };

                filtered.sort((a, b) => {

                            if (currentUserRole === 'user') {

                                return t.subKelasNama === loggedInUser.subKelasNama ||
                                       t.subKelasNama === "Kebaktian Khotbah (Umum)";
                            }
                            // admin filter 'all' → ambil semua
                            if (reportKelasFilter === 'all') return true;
                            // filter kelas tertentu (Sekolah Sabat):
                            // tamu Khotbah tidak dimasukkan ke laporan SS
                            if (t.subKelasNama === "Kebaktian Khotbah (Umum)") {
                                return reportSession === "Khotbah";
                            }
                            return subKelas.find(s => s.nama === t.subKelasNama)?.kelasNama === reportKelasFilter;
                        }).reduce((sum, g) => sum + (g.jumlah || 0), 0);
                        totalTamuBulanIni += count;
                        return count || 0;
                    });

                    const rowTamu = {
                        no: 1, nama: "Tamu Tambahan (Angka)", status: "Tamu",
                        statusList: guestStatusList, hadirCount: totalTamuBulanIni, alpaCount: "-", isTamuTambahan: true
                    };

                    const finalRows = [rowTamu];
                    baseRows.forEach((r, i) => finalRows.push({ ...r, no: i + 2 }));

                    const headers = ["No", "Nama Jemaat", "Status"];
                    sabbatDates.forEach(date => {
                        const d = parseLocalDate(date);
                        headers.push(d ? `${d.getDate()}/${d.getMonth() + 1}` : '');
                    });
                    headers.push("Hadir", "Alpa");

                    return { headers, rows: finalRows, targetCategoryName, sabbatDates };
                } else {
                    const activeSubNama = currentUserRole === 'user' ? loggedInUser.subKelasNama : reportSubKelasFilter;
                    const rows = KEGIATAN_KETERLIBATAN.map(keg => {
                        let tot = 0;

                            const rec = keterlibatan.find(k => k.tanggal === date && k.subKelasNama === activeSubNama);

                            tot += val;
                            return val;

                        return { no: keg.id, kegiatan: keg.text, statusList, total: tot };

                        headers.push(d ? `Sabat (${d.getDate()})` : '');
                    });
                    headers.push("TOTAL");
                    return { headers, rows, targetCategoryName, sabbatDates };
                }

                    : `Bulan: ${reportMonth}`;

                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.5);
                doc.line(14, 28, 283, 28);

                const fileSuffix = isMultiMonth ? `${reportMonth}_sd_${reportMonthEnd}` : reportMonth;

                if (reportType === "presensi") {
                    const tableBody = liveReportPreview.rows.map(row =>
                        [row.no, row.nama, row.status, ...row.statusList, row.hadirCount, row.alpaCount]

                        startY: 32,
                        head: [liveReportPreview.headers],
                        body: tableBody,
                        theme: 'grid',
                        headStyles:      { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold', halign: 'center' },
                        bodyStyles:      { fillColor: [255, 255, 255], textColor: [0, 0, 0], lineColor: [200, 200, 200] },
                        alternateRowStyles: { fillColor: [248, 248, 248] },
                        columnStyles:    { 0: { cellWidth: 10 }, 1: { cellWidth: 55 }, 2: { cellWidth: 32 } },
                        styles:          { fontSize: 8.5, cellPadding: 2 },
                        didParseCell: (data) => {
                            const isTamuRow = data.row.raw && data.row.raw[1] === "Tamu Tambahan (Angka)";
                            if (isTamuRow) {
                                // Baris tamu: latar oranye muda, teks hitam di semua sel
                                data.cell.styles.fillColor  = [255, 225, 180];

                                const numSabbats = sabbatDates.length;

                                    const status = data.cell.text[0];

                                }
                            }
                        }

                    doc.save(`Laporan_Presensi_${fileSuffix}.pdf`);

)}

                                <h3 className="font-extrabold text-amber-400 text-sm">{jemaatModal.mode === 'create' ? 'Tambah Anggota' : 'Edit Anggota'}</h3>
                                <form onSubmit={saveJemaat} className="space-y-3">
                                    <div><label className="block text-slate-400 mb-1">Nama Lengkap *</label><input type="text" name="nama" required defaultValue={jemaatModal.mode === 'edit' ? jemaatModal.data?.nama : ''} className="w-full bg-slate-950 border border-slate-700 p-2 text-white rounded-lg focus:outline-none focus:border-amber-500" /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="block text-slate-400 mb-1">Gender</label><select name="gender" defaultValue={jemaatModal.mode === 'edit' ? jemaatModal.data?.gender : 'Laki-laki'} className="w-full bg-slate-950 text-white p-2 rounded-lg border border-slate-700"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                                        <div><label className="block text-slate-400 mb-1">Status Baptis</label><select name="statusBaptis" defaultValue={jemaatModal.mode === 'edit' ? jemaatModal.data?.statusBaptis : 'Sudah Baptis'} className="w-full bg-slate-950 text-white p-2 rounded-lg border border-slate-700"><option value="Sudah Baptis">Sudah Baptis</option><option value="Belum Baptis">Belum Baptis</option></select></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="block text-slate-400 mb-1">Tanggal Lahir</label><input type="date" name="tglLahir" defaultValue={jemaatModal.mode === 'edit' ? cleanDateString(jemaatModal.data?.tglLahir) : ''} className="w-full bg-slate-950 border border-slate-700 p-2 text-white rounded-lg focus:outline-none focus:border-amber-500" /></div>
                                        <div>
                                            <label className="block text-slate-400 mb-1">Sub-Kelas *</label>
                                            <select name="subKelasNama" required defaultValue={jemaatModal.mode === 'edit' ? jemaatModal.data?.subKelasNama : ''} className="w-full bg-slate-950 text-white p-2 rounded-lg border border-slate-700">
                                                <option value="Kebaktian Khotbah (Umum)">Kebaktian Khotbah (Umum)</option>
                                                {subKelas.map(s => <option key={s.nama} value={s.nama}>{s.nama}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-slate-400 mb-1">Hubungan Jemaat (Bisa pilih lebih dari 1)</label>
                                        <div className="grid grid-cols-2 gap-2 bg-slate-950 p-2.5 rounded-lg border border-slate-700">
                                            {['Jemaat', 'Guru SS', 'Anggota SS', 'Koordinator SS', 'Pemimpin SS'].map(status => (
                                                <label key={status} className="flex items-center gap-2 text-white text-[11px] cursor-pointer hover:text-amber-300">
                                                    <input type="checkbox" name="statusJemaat" value={status} defaultChecked={jemaatModal.mode === 'edit' && (jemaatModal.data?.statusJemaat || '').includes(status)} className="w-4 h-4 rounded accent-amber-500" />
                                                    {status}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button type="button" onClick={() => setJemaatModal({ isOpen: false, mode: 'create', data: null })} className="text-slate-400 px-3 hover:text-white transition">Batal</button>
                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-4 py-2 rounded-lg transition">Simpan & Kirim Ke Cloud</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ── Modal User ── */}
                    {userModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-50 p-4 text-xs">
                            <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl animate-fadeIn">
                                <h3 className="font-extrabold text-amber-400 text-sm">{userModal.mode === 'create' ? 'Tambah Guru/Petugas' : 'Edit Guru/Petugas'}</h3>
                                <form onSubmit={saveUser} className="space-y-3">
                                    <div><label className="block text-slate-400 mb-1">Nama Petugas *</label><input type="text" name="nama" required defaultValue={userModal.mode === 'edit' ? userModal.data.nama : ''} className="w-full bg-slate-950 border border-slate-700 p-2 text-white rounded-lg focus:outline-none focus:border-amber-500" /></div>
                                    <div>
                                        <label className="block text-slate-400 mb-1">Sub-Kelas Penugasan *</label>
                                        <select name="subKelasNama" required defaultValue={userModal.mode === 'edit' ? userModal.data.subKelasNama : ''} className="w-full bg-slate-950 text-white p-2 rounded-lg focus:outline-none focus:border-amber-500 border border-slate-700">
                                            <option value="Kebaktian Khotbah (Umum)">Kebaktian Khotbah (Umum)</option>
                                            {subKelas.map(s => <option key={s.nama} value={s.nama}>{s.nama}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="block text-slate-400 mb-1">PIN Akses *</label><input type={showUserModalPin ? "text" : "password"} name="pin" required defaultValue={userModal.mode === 'edit' ? userModal.data.pin : ''} className="w-full bg-slate-950 border border-slate-700 p-2 text-white rounded-lg focus:outline-none focus:border-amber-500 font-mono tracking-widest" /></div>
                                    <div className="flex items-center gap-2 select-none pt-0.5"><input type="checkbox" id="toggleUserModalPin" checked={showUserModalPin} onChange={(e) => setShowUserModalPin(e.target.checked)} className="w-4 h-4 rounded accent-amber-500" /><label htmlFor="toggleUserModalPin" className="text-slate-400 text-[11px] cursor-pointer hover:text-slate-300 font-semibold">Tampilkan PIN</label></div>
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button type="button" onClick={() => setUserModal({ isOpen: false, mode: 'create', data: null })} className="text-slate-400 px-3 hover:text-white transition">Batal</button>
                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-4 py-2 rounded-lg transition">Simpan & Kirim Ke Cloud</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ── Modal Kelas/SubKelas ── */}
                    {kelasModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-50 p-4 text-xs">
                            <div className="bg-slate-900 border border-white/10 rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl animate-fadeIn">
                                <h3 className="font-extrabold text-amber-400 text-sm">{kelasModal.mode === 'create' ? 'Tambah ' : 'Edit '}{kelasModal.type === 'kelas' ? 'Kelas Utama' : 'Sub-Kelas'}</h3>
                                <form onSubmit={saveKelasOrSubKelas} className="space-y-3">
                                    {kelasModal.type === 'kelas' ? (
                                        <div><label className="block text-slate-400 mb-1">Nama Kelas Utama *</label><input type="text" name="namaKelas" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.nama : ''} className="w-full bg-slate-950 border border-slate-700 p-2 text-white rounded-lg focus:outline-none focus:border-amber-500" /></div>
                                    ) : (
                                        <>
                                            <div><label className="block text-slate-400 mb-1">Nama Sub-Kelas *</label><input type="text" name="namaSubKelas" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.nama : ''} className="w-full bg-slate-950 border border-slate-700 p-2 text-white rounded-lg focus:outline-none focus:border-amber-500" /></div>
                                            <div><label className="block text-slate-400 mb-1">Kelas Induk *</label><select name="parentKelasNama" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.kelasNama : ''} className="w-full bg-slate-950 text-white p-2 rounded-lg focus:outline-none focus:border-amber-500 border border-slate-700">{kelas.map(k => <option key={k.nama} value={k.nama}>{k.nama}</option>)}</select></div>
                                        </>
                                    )}
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button type="button" onClick={() => setKelasModal({ isOpen: false, mode: 'create', data: null, type: 'kelas' })} className="text-slate-400 px-3 hover:text-white transition">Batal</button>
                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-4 py-2 rounded-lg transition">Simpan & Kirim Ke Cloud</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
