    <script>
        // Set tema awal sebelum React render untuk mencegah FOUC (Flash of Unstyled Content)
        // Default diubah menjadi Light mode (jika tidak ada data di localStorage)
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    
    
    <!-- HAPUS SCRIPT LUCIDE KARENA ANDA SUDAH MEMILIKI KOMPONEN ICON CUSTOM (Mengurangi beban download) -->
