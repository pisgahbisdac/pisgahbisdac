<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISGAH BISDAC - Matrix System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --navy-dark: #0a192f;
            --navy-light: #112240;
            --gold: #D4AF37;
            --gold-light: #F1D279;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(10, 25, 47, 0.96), rgba(10, 25, 47, 0.98)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            color: #e6f1ff;
            font-size: 16px;
            overflow-x: hidden;
        }

        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F1D279 100%); }
        
        .glass-card {
            background: rgba(17, 34, 64, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.5rem;
        }

        .tab-active { border-bottom: 4px solid var(--gold); color: var(--gold); font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .drag-item { 
            cursor: grab; transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .drag-item:hover { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        
        .drop-zone { min-height: 300px; border: 2px dashed rgba(212, 175, 55, 0.2); transition: all 0.3s; }
        
        input[type=text], input[type=number], select, input[type=date] {
            color: var(--gold) !important;
            background-color: #050d1a !important;
            border: 2px solid var(--gold) !important;
            border-radius: 0.75rem;
            padding: 0.8rem 1rem;
            font-weight: 700;
            outline: none;
            width: 100%;
        }

        select option {
            background-color: var(--navy-dark);
            color: var(--gold);
        }

        input[type=number] {
            text-align: center;
            font-size: 1.2rem;
            width: 100px;
        }
        
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .custom-checkbox {
            appearance: none; width: 2.2rem; height: 2.2rem;
            border: 2.5px solid var(--gold); border-radius: 10px;
            cursor: pointer; position: relative;
        }
        .custom-checkbox:checked { background-color: var(--gold); }
        .custom-checkbox:checked::after {
            content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: var(--navy-dark); position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 1.2rem;
        }

        .role-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--gold);
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
            cursor: pointer;
            color: var(--gold);
        }
        .role-btn.active {
            background-color: var(--gold);
            color: var(--navy-dark);
        }

        .loading-spinner { 
            border: 6px solid rgba(212, 175, 55, 0.1); width: 70px; height: 70px; 
            border-radius: 50%; border-left-color: var(--gold); animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="bg-[#0a192f]/95 border-b border-[#D4AF37]/50 text-white p-6 shadow-2xl sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="p-3 gold-gradient rounded-xl shadow-lg">
                    <i class="fas fa-church text-[#0a192f] text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight text-[#D4AF37]">PISGAH BISDAC</h1>
                    <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Official Database Matrix</p>
                </div>
            </div>
            <div id="connectionStatus" class="text-[12px] font-black border-2 border-[#D4AF37] text-[#D4AF37] px-4 py-2 rounded-full uppercase">
                <i class="fas fa-circle-notch fa-spin mr-2"></i> Syncing...
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div class="flex overflow-x-auto space-x-12 mb-10 no-scrollbar border-b border-white/10 scroll-smooth relative py-2">
            <button onclick="switchTab('khotbah')" id="btn-khotbah" class="pb-4 px-2 whitespace-nowrap tab-active text-xl uppercase font-black tracking-wider">Khotbah</button>
            <button onclick="switchTab('ss_dewasa')" id="btn-ss_dewasa" class="pb-4 px-2 whitespace-nowrap text-slate-400 text-xl uppercase font-black tracking-wider">SS Dewasa</button>
            <button onclick="switchTab('ss_anak')" id="btn-ss_anak" class="pb-4 px-2 whitespace-nowrap text-slate-400 text-xl uppercase font-black tracking-wider">SS Anak</button>
            <button onclick="switchTab('pa')" id="btn-pa" class="pb-4 px-2 whitespace-nowrap text-slate-400 text-xl uppercase font-black tracking-wider">PA</button>
            <button onclick="switchTab('kegiatan')" id="btn-kegiatan" class="pb-4 px-2 whitespace-nowrap text-slate-400 text-xl uppercase font-black tracking-wider">Kegiatan</button>
            <button onclick="switchTab('anggota')" id="btn-anggota" class="pb-4 px-2 whitespace-nowrap text-slate-400 text-xl uppercase font-black tracking-wider">Database</button>
        </div>

        <!-- Section: Khotbah -->
        <section id="sec-khotbah" class="tab-content">
            <div class="glass-card p-8">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                    <h3 class="text-3xl font-black text-[#D4AF37] uppercase tracking-tighter">KEHADIRAN KHOTBAH</h3>
                    <div class="flex flex-wrap items-center gap-6">
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-gold font-black uppercase">TAMU</span>
                            <input type="number" id="khotbahTamu" value="0">
                        </div>
                        <input type="date" id="khotbahDate" style="width: auto;">
                    </div>
                </div>
                <div id="khotbahList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                <button onclick="submitAttendance('khotbah')" class="w-full mt-10 gold-gradient text-[#0a192f] py-6 rounded-2xl font-black text-2xl shadow-2xl hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-tighter">SIMPAN DATA KHOTBAH</button>
            </div>
        </section>

        <!-- Section: Shared Area (SS / PA / Kegiatan) -->
        <section id="sec-shared" class="tab-content hidden">
            <div class="flex flex-col lg:flex-row gap-8">
                <div id="sidePool" class="w-full lg:w-1/3 glass-card p-8 h-fit sticky top-32">
                    <h3 class="font-black mb-6 text-[#D4AF37] text-xl uppercase tracking-tight">CARI JEMAAT</h3>
                    <input type="text" placeholder="Masukkan nama..." onkeyup="filterPool(this)" class="mb-6">
                    <div id="memberPool" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 no-scrollbar"></div>
                </div>

                <div class="flex-1 glass-card p-8">
                    <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div id="dynamicTitle"></div>
                        <div class="flex flex-wrap items-center gap-6">
                             <div id="tamuContainer" class="flex items-center gap-3">
                                <span class="text-xs text-gold font-black uppercase">TAMU</span>
                                <input type="number" id="sharedTamu" value="0">
                            </div>
                            <input type="date" id="sharedDate" style="width: auto;">
                        </div>
                    </div>
                    
                    <div id="kegiatanForm" class="hidden space-y-6">
                        <div id="kegiatanInputs" class="grid grid-cols-1 gap-6"></div>
                    </div>

                    <div id="mainDropZone" ondragover="event.preventDefault()" ondrop="handleDrop(event)" class="drop-zone rounded-3xl p-8 bg-black/30">
                        <div id="selectedList" class="space-y-6"></div>
                    </div>
                    
                    <button id="btnSubmitZone" onclick="submitAttendanceFromZone()" class="w-full mt-10 gold-gradient text-[#0a192f] py-6 rounded-2xl font-black text-2xl shadow-2xl hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-tighter">SIMPAN DATA</button>
                </div>
            </div>
        </section>

        <!-- Section: Database Anggota -->
        <section id="sec-anggota" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="glass-card p-8 h-fit">
                    <h3 class="font-black text-[#D4AF37] mb-8 text-2xl uppercase tracking-tight">ADMINISTRASI JEMAAT</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="text-[12px] uppercase font-black text-gold tracking-widest mb-2 block">NAMA LENGKAP</label>
                            <input type="text" id="newMemberName">
                        </div>
                        <div>
                            <label class="text-[12px] uppercase font-black text-gold tracking-widest mb-2 block">STATUS ROHANI</label>
                            <select id="newMemberStatus">
                                <option value="Baptis">Sudah Baptis</option>
                                <option value="Belum Baptis">Belum Baptis</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[12px] uppercase font-black text-gold tracking-widest mb-2 block">PENEMPATAN KELAS</label>
                            <select id="newMemberClass">
                                <option value="Tidak Ada">Pilih Kelas...</option>
                                <option value="SS Dewasa">SS Dewasa</option>
                                <option value="SS Anak">SS Anak</option>
                                <option value="PA">Pendalaman Alkitab</option>
                            </select>
                        </div>
                        <button onclick="addMember()" class="w-full gold-gradient text-[#0a192f] py-5 rounded-2xl font-black text-xl shadow-xl hover:scale-[1.01] transition-all uppercase mt-4">SIMPAN JEMAAT</button>
                    </div>
                </div>
                <div class="lg:col-span-2 glass-card p-8">
                    <h3 class="font-black text-[#D4AF37] mb-8 text-2xl uppercase tracking-tight">LIST MASTER JEMAAT</h3>
                    <div id="allMembersList" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 gold-gradient text-[#0a192f] px-12 py-5 rounded-full opacity-0 transition-all pointer-events-none z-[100] shadow-2xl font-black text-xl">PESAN</div>
    <div id="loadingOverlay" class="fixed inset-0 bg-[#0a192f]/98 flex items-center justify-center z-[200] hidden backdrop-blur-2xl">
        <div class="flex flex-col items-center">
            <div class="loading-spinner mb-8"></div>
            <p class="text-[#D4AF37] font-black tracking-[0.3em] text-2xl uppercase animate-pulse">SINKRONISASI DATABASE...</p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzKhoegE49TJy_Rm1R2lJermJGzmt2zFqemWiyr4yth8eGbC0OzPNqxr7CutjQiVYkkow/exec";
        
        let members = [];
        let currentTab = 'khotbah';
        let selectedData = { ss_dewasa: [], ss_anak: [], pa: [] };

        const CATEGORY_MAP = { 'ss_dewasa': 'SS Dewasa', 'ss_anak': 'SS Anak', 'pa': 'PA' };

        const KEGIATAN_ITEMS = [
            "Anggota datang tepat waktu di SS",
            "Anggota membaca Alkitab setiap hari",
            "Anggota Renungan Pagi setiap hari",
            "Anggota Belajar SS setiap hari",
            "Anggota hadir di Kebaktian Rabu Malam",
            "Anggota melakukan Jangkauan Keluar",
            "Anggota melakukan Perlawatan Pemeliharaan",
            "Anggota melakukan Doa (777, 1752 & Subuh)",
            "Anggota terlibat Kelompok Kecil",
            "Anggota membagikan risalah/buku rohani"
        ];

        async function init() {
            toggleLoading(true);
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('khotbahDate').value = today;
            document.getElementById('sharedDate').value = today;

            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                const result = await response.json();
                if (result.status === 'success') {
                    members = result.members;
                    document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-check-circle mr-2"></i> SINKRON';
                    loadPredefinedClasses();
                    renderAll();
                }
            } catch (e) { 
                showToast("GAGAL KONEKSI!", "error"); 
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-times-circle mr-2"></i> OFFLINE';
            }
            toggleLoading(false);
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('button[id^="btn-"]').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-slate-400');
            });
            
            const btn = document.getElementById('btn-' + tabId);
            if(btn) { 
                btn.classList.add('tab-active'); 
                btn.classList.remove('text-slate-400');
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            if(['ss_dewasa', 'ss_anak', 'pa', 'kegiatan'].includes(tabId)) {
                document.getElementById('sec-shared').classList.remove('hidden');
                const isKegiatan = tabId === 'kegiatan';
                document.getElementById('sidePool').classList.toggle('hidden', isKegiatan);
                document.getElementById('kegiatanForm').classList.toggle('hidden', !isKegiatan);
                document.getElementById('mainDropZone').classList.toggle('hidden', isKegiatan);
                document.getElementById('tamuContainer').classList.toggle('hidden', isKegiatan);
                updateZoneUI();
            } else {
                document.getElementById('sec-' + tabId).classList.remove('hidden');
            }
        }

        function loadPredefinedClasses() {
            Object.keys(selectedData).forEach(key => {
                const mappedCategory = CATEGORY_MAP[key];
                const assigned = members.filter(m => m.kelasTetap === mappedCategory);
                selectedData[key] = assigned.map(m => ({ id: m.id, nama: m.nama, roles: ['Anggota'] }));
            });
        }

        function renderAll() {
            renderKhotbah();
            renderPools();
            renderMemberManagement();
        }

        function renderKhotbah() {
            const list = document.getElementById('khotbahList');
            list.innerHTML = members.map(m => `
                <div class="bg-white/5 p-6 rounded-2xl flex justify-between items-center border-2 border-white/5 hover:border-gold/40 transition-all">
                    <div>
                        <div class="font-black text-white text-xl uppercase tracking-tight">${m.nama}</div>
                        <div class="text-[10px] text-gold/60 uppercase font-black tracking-widest mt-1">${m.status} | ${m.kelasTetap}</div>
                    </div>
                    <input type="checkbox" data-member="${m.id}" data-nama="${m.nama}" class="custom-checkbox">
                </div>
            `).join('');
        }

        function renderPools() {
            const pool = document.getElementById('memberPool');
            pool.innerHTML = members.map(m => `
                <div draggable="true" ondragstart="handleDragStart(event, '${m.id}', '${m.nama}')" onclick="addToZone('${m.id}', '${m.nama}')" 
                     class="drag-item p-5 rounded-2xl flex justify-between items-center group">
                    <span class="font-black text-white text-lg group-hover:text-gold uppercase tracking-tighter">${m.nama}</span>
                    <i class="fas fa-plus-circle text-gold/20 group-hover:text-gold transition-all text-xl"></i>
                </div>
            `).join('');
        }

        function toggleRole(memberIdx, roleName) {
            const currentRoles = selectedData[currentTab][memberIdx].roles;
            const roleIdx = currentRoles.indexOf(roleName);
            
            if (roleIdx > -1) {
                if (currentRoles.length > 1) currentRoles.splice(roleIdx, 1);
            } else {
                currentRoles.push(roleName);
            }
            updateZoneUI();
        }

        function updateZoneUI() {
            const title = document.getElementById('dynamicTitle');
            const list = document.getElementById('selectedList');
            const kInputContainer = document.getElementById('kegiatanInputs');

            title.innerHTML = `<h3 class="text-3xl font-black text-gold uppercase tracking-tighter">${CATEGORY_MAP[currentTab] || 'MATRIX KETERLIBATAN'}</h3>`;
            
            if(currentTab === 'kegiatan') {
                kInputContainer.innerHTML = KEGIATAN_ITEMS.map((k, i) => `
                    <div class="relative overflow-hidden flex items-center gap-10 bg-white/5 p-6 rounded-2xl border-2 border-white/10 group hover:border-gold/40 transition-all">
                        <div class="absolute -right-4 -bottom-8 text-9xl font-black text-white/5 select-none pointer-events-none group-hover:text-gold/10 transition-colors">${i+1}</div>
                        <div class="flex-1 relative z-10"><span class="text-xl font-black text-white leading-tight uppercase tracking-tighter">${k}</span></div>
                        <input type="number" id="k-val-${i}" value="0" min="0">
                    </div>
                `).join('');
            }

            if(['ss_dewasa', 'ss_anak', 'pa'].includes(currentTab)) {
                const currentData = selectedData[currentTab];
                const availableRoles = ['Anggota', 'Guru', 'Pemimpin', 'Kordinator'];
                
                list.innerHTML = currentData.map((item, idx) => `
                    <div class="bg-white/5 p-6 rounded-2xl border-2 border-gold/20 transition-all">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div class="flex-1 font-black text-white text-2xl uppercase tracking-tighter">${item.nama}</div>
                            <div class="flex flex-wrap gap-2">
                                ${availableRoles.map(role => `
                                    <button onclick="toggleRole(${idx}, '${role}')" 
                                            class="role-btn ${item.roles.includes(role) ? 'active' : ''}">
                                        ${role}
                                    </button>
                                `).join('')}
                            </div>
                            <button onclick="removeFromZone(${idx})" class="text-red-500 hover:text-red-400 text-2xl transition-colors bg-red-500/10 p-4 rounded-xl">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>`).join('');
            }
        }

        async function submitAttendance(type) {
            const records = [];
            const dateInput = document.getElementById('khotbahDate').value;
            const dateParts = dateInput.split('-');
            const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
            const tamuVal = document.getElementById('khotbahTamu').value || 0;
            
            document.querySelectorAll('#khotbahList input[type="checkbox"]').forEach(el => {
                if(el.checked) records.push({ memberId: el.dataset.member, nama: el.dataset.nama, status: 'Hadir' });
            });
            
            if(records.length === 0 && tamuVal == 0) return showToast("PILIH JEMAAT!", "error");
            sendToAPI({ type: 'khotbah', tanggal: formattedDate, tamu: tamuVal, records });
        }

        async function submitAttendanceFromZone() {
            const dateInput = document.getElementById('sharedDate').value;
            const dateParts = dateInput.split('-');
            const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

            if(currentTab === 'kegiatan') {
                const poin = KEGIATAN_ITEMS.map((_, i) => document.getElementById(`k-val-${i}`).value || 0);
                sendToAPI({ type: 'kegiatan', tanggal: formattedDate, poin: poin });
            } else {
                const data = selectedData[currentTab];
                const tamuVal = document.getElementById('sharedTamu').value || 0;
                if(data.length === 0 && tamuVal == 0) return showToast("DATA KOSONG!", "error");
                
                const records = data.map(item => ({ 
                    memberId: item.id, 
                    nama: item.nama, 
                    // Kita kirimkan detail ke API, tapi Backend akan menyimpannya sebagai "Hadir" saja
                    status: 'Hadir' 
                }));
                sendToAPI({ type: currentTab, category: CATEGORY_MAP[currentTab], tanggal: formattedDate, tamu: tamuVal, records });
            }
        }

        async function sendToAPI(payload) {
            toggleLoading(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'submitAttendance', data: payload }) });
                const result = await res.json();
                if(result.status === 'success') showToast("BERHASIL DISIMPAN!");
            } catch (e) { showToast("GAGAL KIRIM DATA!", "error"); }
            toggleLoading(false);
        }

        async function addMember() {
            const nama = document.getElementById('newMemberName').value;
            const status = document.getElementById('newMemberStatus').value;
            const kelasTetap = document.getElementById('newMemberClass').value;
            if(!nama) return showToast("NAMA WAJIB ISI!", "error");
            toggleLoading(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'addMember', data: { nama, status, kelasTetap } }) });
                const result = await res.json();
                if(result.status === 'success') {
                    members.push({ id: result.id, nama, status, kelasTetap });
                    loadPredefinedClasses();
                    renderAll();
                    document.getElementById('newMemberName').value = '';
                    showToast("JEMAAT TERSIMPAN!");
                }
            } catch(e) { showToast("ERROR DATABASE!", "error"); }
            toggleLoading(false);
        }

        function addToZone(id, nama) {
            if(!['ss_dewasa', 'ss_anak', 'pa'].includes(currentTab)) return;
            if(selectedData[currentTab].find(x => x.id === id)) return showToast("SUDAH ADA!", "error");
            selectedData[currentTab].push({id, nama, roles: ['Anggota']});
            updateZoneUI();
        }

        function removeFromZone(idx) { selectedData[currentTab].splice(idx, 1); updateZoneUI(); }
        function handleDragStart(e, id, nama) { e.dataTransfer.setData("id", id); e.dataTransfer.setData("nama", nama); }
        function handleDrop(e) { e.preventDefault(); addToZone(e.dataTransfer.getData("id"), e.dataTransfer.getData("nama")); }
        
        function filterPool(input) {
            const f = input.value.toLowerCase();
            document.querySelectorAll('#memberPool .drag-item').forEach(it => {
                it.style.display = it.textContent.toLowerCase().includes(f) ? "" : "none";
            });
        }

        function renderMemberManagement() {
            const list = document.getElementById('allMembersList');
            list.innerHTML = members.map(m => `
                <div class="p-6 bg-white/5 rounded-2xl border-2 border-white/5 flex justify-between items-center group">
                    <div class="flex flex-col">
                        <span class="font-black text-2xl text-white uppercase tracking-tighter">${m.nama}</span>
                        <span class="text-[12px] text-gold/60 font-black uppercase tracking-widest mt-1">UNIT: ${m.kelasTetap}</span>
                    </div>
                    <span class="text-[12px] bg-gold/10 text-gold px-4 py-2 rounded-xl uppercase font-black tracking-widest border-2 border-gold/30">${m.status}</span>
                </div>`).join('');
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.opacity = '1'; t.style.bottom = '40px';
            setTimeout(() => { t.style.opacity = '0'; t.style.bottom = '12px'; }, 3000);
        }

        function toggleLoading(s) { document.getElementById('loadingOverlay').classList.toggle('hidden', !s); }

        window.onload = init;
    </script>
</body>
</html>
