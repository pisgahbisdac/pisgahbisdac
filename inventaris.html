<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#151924">
  <title>Inventaris - PISGAH-BISDAC</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="/src/index.css">
  
  <style>
    :root {
      --bg-dark: #0b1a30;
      --bg-card: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #d4af37;
    }
    
    body {
      background: var(--bg-dark);
      color: #eae7e2;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .hero-section {
      background: linear-gradient(135deg, rgba(11,26,48,0.95) 0%, rgba(21,25,36,0.98) 100%), url('https://images.unsplash.com/photo-1548625361-ec8587d60f58?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
      padding: 80px 20px 60px;
      text-align: center;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 15px;
      text-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
    }
    
    .search-bar {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 40px;
      position: relative;
    }
    
    .search-bar input {
      width: 100%;
      padding: 16px 24px 16px 48px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .search-bar input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }
    
    .search-bar i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
    }
    
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: 0 20px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .asset-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      position: relative;
    }
    
    .asset-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-color: rgba(212, 175, 55, 0.3);
    }
    
    .asset-photo {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #000;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .asset-info {
      padding: 20px;
    }
    
    .asset-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      margin-bottom: 10px;
    }
    
    .asset-meta {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .asset-value {
      font-weight: 700;
      color: #4ade80;
      margin-top: 15px;
      font-size: 1.1rem;
    }
    
    .badge-status {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: rgba(11,26,48,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    
    .btn-primary:hover {
      background: #f0c950;
      transform: scale(1.05);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    
    .btn-outline:hover {
      background: rgba(212, 175, 55, 0.1);
    }
    
    /* Modal styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal-content {
      background: var(--bg-dark);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
    }
    
    .form-control {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: white;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .barcode-container {
      text-align: center;
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }
    
    #barcodeSVG {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div style="display:flex; align-items:center; gap:10px;">
      <a href="/" style="color:var(--accent); text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
      <h2 style="margin:0; font-size:1.1rem; color:white; font-weight:600; margin-left:15px;">Inventaris PISGAH</h2>
    </div>
    <div>
      <button id="loginBtn" class="btn btn-outline"><i class="fa-solid fa-user-lock"></i> Login Admin</button>
      <div id="adminControls" style="display:none; gap:10px;">
        <span id="userNameDisplay" style="color:var(--accent); margin-right:10px;"></span>
        <button id="addBtn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Tambah Aset</button>
        <button id="logoutBtn" class="btn btn-outline" style="border-color:rgba(255,255,255,0.3); color:white;"><i class="fa-solid fa-sign-out-alt"></i></button>
      </div>
    </div>
  </nav>

  <header class="hero-section">
    <h1 class="hero-title">Aset & Peralatan Gereja</h1>
    <p style="color:rgba(255,255,255,0.8); margin-bottom:30px; font-size:1.1rem; max-width:600px; margin-left:auto; margin-right:auto;">Sistem Informasi Manajemen Inventaris Gereja PISGAH-BISDAC</p>
    
    <div class="search-bar">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="searchInput" placeholder="Cari nama peralatan, lokasi, atau penanggung jawab...">
    </div>
  </header>

  <main style="padding-top:40px;">
    <div id="inventoryGrid" class="inventory-grid">
      <!-- Cards will be rendered here by JS -->
      <div style="text-align:center; grid-column: 1 / -1; padding: 40px;">
        <i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--accent);"></i>
        <p style="margin-top:15px; color:rgba(255,255,255,0.6);">Memuat data inventaris...</p>
      </div>
    </div>
  </main>

  <!-- Login Modal -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-content" style="max-width:350px;">
      <h3 style="margin-top:0; color:var(--accent); font-size:1.5rem; text-align:center;">Login Pengurus</h3>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" class="form-control">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control">
      </div>
      <button id="doLoginBtn" class="btn btn-primary" style="width:100%; margin-top:10px;">Masuk</button>
      <button onclick="document.getElementById('loginModal').style.display='none'" class="btn" style="width:100%; margin-top:10px; background:transparent; color:white;">Batal</button>
    </div>
  </div>

  <!-- Form Modal (Add/Edit) -->
  <div id="formModal" class="modal-overlay">
    <div class="modal-content">
      <h3 id="formTitle" style="margin-top:0; color:var(--accent); font-size:1.5rem;">Tambah Aset Baru</h3>
      
      <input type="hidden" id="formId">
      
      <div class="form-group">
        <label>Nama Peralatan *</label>
        <input type="text" id="formName" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>Tanggal Perolehan</label>
        <input type="date" id="formDate" class="form-control">
      </div>
      
      <div class="form-group admin-only-field">
        <label>Nilai Perolehan (Rp)</label>
        <input type="text" id="formValue" class="form-control" placeholder="0">
      </div>
      
      <div class="form-group">
        <label>Lokasi / Status *</label>
        <input type="text" id="formLocation" class="form-control" placeholder="Contoh: Gudang, Ruang Ibadah" required>
      </div>
      
      <div class="form-group">
        <label>Penanggung Jawab *</label>
        <input type="text" id="formPic" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>Foto Aset</label>
        <input type="file" id="formPhoto" class="form-control" accept="image/*">
        <div id="photoPreview" style="margin-top:10px; display:none;">
          <img id="photoPreviewImg" src="" style="max-width:100%; max-height:150px; border-radius:8px; border:1px solid var(--glass-border);">
        </div>
      </div>
      
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px;">
        <button onclick="closeFormModal()" class="btn btn-outline" style="border-color:rgba(255,255,255,0.3); color:white;">Batal</button>
        <button id="saveBtn" class="btn btn-primary">Simpan Data</button>
      </div>
    </div>
  </div>

  <!-- Detail & Barcode Modal -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <h3 id="detailName" style="margin-top:0; color:white; font-size:1.5rem; margin-bottom:5px;">Nama Aset</h3>
        <button onclick="document.getElementById('detailModal').style.display='none'" style="background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer;"><i class="fa-solid fa-times"></i></button>
      </div>
      <p id="detailId" style="color:var(--accent); font-family:monospace; margin-top:0; margin-bottom:20px;">INV-XXX</p>
      
      <img id="detailPhoto" src="" style="width:100%; height:auto; border-radius:12px; margin-bottom:20px; display:none;">
      
      <div style="background:rgba(255,255,255,0.05); border-radius:12px; padding:15px; margin-bottom:20px;">
        <div class="asset-meta"><i class="fa-solid fa-calendar"></i> <span id="detailDate"></span></div>
        <div class="asset-meta"><i class="fa-solid fa-location-dot"></i> <span id="detailLocation"></span></div>
        <div class="asset-meta"><i class="fa-solid fa-user"></i> <span id="detailPic"></span></div>
        <div id="detailValueContainer" class="asset-meta admin-only-field" style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; display:none;">
          <i class="fa-solid fa-money-bill-wave"></i> <span id="detailValue" style="color:#4ade80; font-weight:bold; font-size:1.1rem;"></span>
        </div>
      </div>
      
      <div class="barcode-container">
        <p style="color:#333; margin-top:0; font-size:0.9rem; font-weight:600;">Barcode Inventaris</p>
        <svg id="barcodeSVG"></svg>
      </div>
      
      <div id="detailAdminActions" style="display:none; justify-content:space-between; margin-top:20px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
        <button id="deleteBtn" class="btn" style="background:rgba(220,38,38,0.2); color:#ef4444; border:1px solid rgba(220,38,38,0.5);"><i class="fa-solid fa-trash"></i> Hapus</button>
        <button id="editBtn" class="btn btn-primary"><i class="fa-solid fa-edit"></i> Edit Data</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script type="module" src="/src/inventarisEntry.js"></script>
</body>
</html>
