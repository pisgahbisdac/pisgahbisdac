    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwW-Km_huyHl-RZ18MSjVXTF46bNJGDb634-hqqhGCwRgV2VsCqx6vG3dmQSqStJhE-/exec";

        const KEGIATAN_KETERLIBATAN = [
            { id: 1, text: "Jumlah Anggota yang datang tepat waktu di Kebaktian Sekolah Sabat", autoFill: true },
            { id: 2, text: "Jumlah Anggota yang membaca Alkitab setiap hari", autoFill: false },
            { id: 3, text: "Jumlah Anggota yang Renungan Pagi setiap hari", autoFill: false },
            { id: 4, text: "Jumlah Anggota yang Belajar Sekolah Sabat setiap hari", autoFill: false },
            { id: 5, text: "Jumlah Anggota yang hadir di Kebaktian Rabu Malam", autoFill: false },
            { id: 6, text: "Jumlah Anggota yang melakukan Jangkauan Keluar (Discipleship)", autoFill: false },
            { id: 7, text: "Jumlah Anggota yang melakukan Perawatan Pemeliharaan (Nurturing & Reclaiming)", autoFill: false },
            { id: 8, text: "Jumlah Anggota yang melakukan Doa (777, 1752 & Doa Subuh)", autoFill: false },
            { id: 9, text: "Jumlah Anggota yang terlibat/mengadakan kegiatan Kelompok Kecil", autoFill: false },
            { id: 10, text: "Jumlah Anggota yang membagikan risalah, buku rohani, kursus Alkitab tertulis.", autoFill: false }
        ];

        const cleanDateString = (dateInput) => {
            if (!dateInput) return "";
            if (typeof dateInput === 'string') {
                if (dateInput.includes('T')) return dateInput.split('T')[0];
                return dateInput;
            }
            return "";
        };

        const formatLocalYYYYMMDD = (dateObj) => {
            if (!dateObj) return "";
            const year  = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day   = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const maskNoHp = (noHp) => {
            if (!noHp) return "-";
            const str = String(noHp).replace(/\s/g, "");
            if (str.length <= 4) return "****";
            const visible = str.slice(0, 4);
            const end     = str.slice(-2);
            const masked  = "*".repeat(Math.max(0, str.length - 6));
            return `${visible}${masked}${end}`;
        };

        const parseLocalDate = (dateStr) => {
            if (!dateStr) return null;
            const cleaned = cleanDateString(dateStr);
            const parts   = cleaned.split('-');
            if (parts.length !== 3) return null;
            return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        };

        const getSabbatsInMonth = (yearMonth) => {
            if (!yearMonth) return [];
            const [year, month] = yearMonth.split('-').map(Number);
            const sabbats = [];
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month - 1, d);
                if (date.getDay() === 6) {
                    sabbats.push(formatLocalYYYYMMDD(date));
                }
            }
            return sabbats;
        };

    function KeterlibatanRadarChart({ keterlibatan, subKelas, absen, isDarkMode, parseLocalDate }) {
    const radarRef = useRef(null);
    const chartRef = useRef(null);

    // Ambil tanggal Sabat terakhir yang punya data keterlibatan
    const lastSabbatWithData = useMemo(() => {
        const dates = [...new Set(keterlibatan.map(k => k.tanggal))].sort();
        return dates[dates.length - 1] || null;
    }, [keterlibatan]);

    // Ambil tanggal Sabat terakhir dari absen (fallback label)
    const lastSabbatFromAbsen = useMemo(() => {
        const dates = [...new Set(absen.filter(a => a.sesi === "Sekolah Sabat").map(a => a.tanggal))].sort();
        return dates[dates.length - 1] || null;
    }, [absen]);

    const targetDate = lastSabbatWithData || lastSabbatFromAbsen;

    // Agregat nilai per indikator (sum semua sub-kelas di tanggal terakhir)
    const aggregatedValues = useMemo(() => {
        if (!targetDate) return Array(10).fill(0);
        const recsForDate = keterlibatan.filter(k => k.tanggal === targetDate);
        return KEGIATAN_KETERLIBATAN.map(keg => {
            return recsForDate.reduce((sum, rec) => sum + (rec.values?.[keg.id] || 0), 0);
        });
    }, [keterlibatan, targetDate]);

    const maxVal = Math.max(...aggregatedValues, 1);

    // Label pendek untuk radar
    const shortLabels = [
        "Tepat Waktu", "Baca Alkitab", "Renungan", "Belajar SS",
        "Hadir Rabu", "Jangkauan", "Perawatan", "Doa", "Kel. Kecil", "Risalah"
    ];

    useEffect(() => {
        if (!window.Chart || !radarRef.current) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

        const textColor  = isDarkMode ? "rgba(255,255,255,0.65)" : "rgba(15,23,42,0.6)";
        const gridColor  = isDarkMode ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
        const pointColor = isDarkMode ? "#2dd4bf" : "#0d9488";
        const fillColor  = isDarkMode ? "rgba(45,212,191,0.25)" : "rgba(13,148,136,0.18)";
        const lineColor  = isDarkMode ? "#2dd4bf" : "#0d9488";

        chartRef.current = new Chart(radarRef.current, {
            type: "radar",
            data: {
                labels: shortLabels,
                datasets: [{
                    label: "Jumlah Anggota",
                    data: aggregatedValues,
                    backgroundColor: fillColor,
                    borderColor: lineColor,
                    borderWidth: 2.5,
                    pointBackgroundColor: pointColor,
                    pointBorderColor: isDarkMode ? "#fff" : "#fff",
                    pointBorderWidth: 1.5,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => ` ${ctx.raw} anggota`,
                            title: (items) => KEGIATAN_KETERLIBATAN[items[0].dataIndex]?.text || items[0].label,
                        }
                    }
                },
                scales: {
                    r: {
                        min: 0,
                        max: maxVal,
                        ticks: {
                            stepSize: Math.max(1, Math.ceil(maxVal / 4)),
                            color: textColor,
                            backdropColor: "transparent",
                            font: { size: 9 }
                        },
                        pointLabels: {
                            color: textColor,
                            font: { size: 10, weight: "bold" }
                        },
                        grid:        { color: gridColor },
                        angleLines:  { color: gridColor },
                    }
                }
            }
        });

        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
    }, [aggregatedValues, isDarkMode, maxVal]);

    const dateLabel = targetDate
        ? (() => { const d = parseLocalDate(targetDate); return d ? `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}` : targetDate; })()
        : "–";

    return (
        <div className="flex flex-col flex-1">
            {targetDate ? (
                <p className="text-[10px] text-teal-600 dark:text-teal-400 font-bold mb-3 bg-teal-50 dark:bg-teal-500/10 border border-teal-200 dark:border-teal-500/20 px-2.5 py-1 rounded-lg inline-block self-start">
                    <i className="fa-solid fa-calendar-check mr-1"></i> Data: {dateLabel}
                </p>
            ) : (
                <p className="text-xs text-slate-500 italic mb-3">Belum ada data keterlibatan.</p>
            )}
            <div style={{ position: "relative", height: "200px" }}>
                <canvas ref={radarRef}></canvas>
            </div>
            {/* Mini legend nilai */}
            <div className="mt-4 grid grid-cols-2 gap-x-4 gap-y-1.5">
                {shortLabels.map((label, i) => (
                    <div key={i} className="flex items-center justify-between text-[10px]">
                        <span className="text-slate-500 dark:text-slate-400 truncate">{label}</span>
                        <span className="font-black text-teal-600 dark:text-teal-400 ml-1 shrink-0">{aggregatedValues[i]}</span>
                    </div>
                ))}
            </div>
        </div>
    );
}

        function DashboardCharts({ jemaat, absen, tamuTambahan, subKelas, metrics, parseLocalDate, currentUserRole, isDarkMode, keterlibatan }) {
            const trendRef    = useRef(null);
            const donutRef    = useRef(null);
            const ageRef      = useRef(null);
            const genderRef   = useRef(null);
            const subkelasRef = useRef(null);
            const chartsRef   = useRef({});
            const [trendMode, setTrendMode] = useState("jumlah");

            const PALETTE = ["#378ADD","#1D9E75","#BA7517","#D4537E","#7F77DD","#639922","#D85A30"];
            const destroyChart = (key) => { if (chartsRef.current[key]) { chartsRef.current[key].destroy(); delete chartsRef.current[key]; } };

            const SUBKELAS_NAMES = subKelas.map(s => s.nama);

            const sabbatList = useMemo(() => {
                const dates = [...new Set(absen.filter(a => a.sesi === "Sekolah Sabat").map(a => a.tanggal))].sort();
                return dates.slice(-6);
            }, [absen]);

            const hadirPerSubPerSabbat = useMemo(() =>
                SUBKELAS_NAMES.map(sub =>
                    sabbatList.map(tgl =>
                        absen.filter(a => a.tanggal === tgl && a.sesi === "Sekolah Sabat" && a.status === "Hadir" &&
                            jemaat.find(j => j.nama === a.jemaatNama)?.subKelasNama === sub).length
                    )
                ), [sabbatList, absen, jemaat, subKelas]);

            const totalHadirPerSabbat = useMemo(() => {
                return sabbatList.map((tgl, i) => {
                    const fromAbsen = hadirPerSubPerSabbat.reduce((sum, arr) => sum + (arr[i] || 0), 0);
                    const fromTamu = tamuTambahan.filter(t => t.tanggal === tgl && t.sesi === "Sekolah Sabat").reduce((sum, g) => sum + (g.jumlah || 0), 0);
                    return fromAbsen + fromTamu;
                });
            }, [sabbatList, hadirPerSubPerSabbat, tamuTambahan]);

            const khotbahPerSabbat = useMemo(() => {
                return sabbatList.map(tgl => {
                    const fromAbsen = absen.filter(a => a.tanggal === tgl && a.sesi === "Khotbah" && a.status === "Hadir").length;
                    const fromTamu = tamuTambahan.filter(t => t.tanggal === tgl && t.sesi === "Khotbah").reduce((sum, g) => sum + (g.jumlah || 0), 0);
                    return fromAbsen + fromTamu;
                });
            }, [sabbatList, absen, tamuTambahan]);

            const ageGroups = useMemo(() => {
                const groups = { "<12": 0, "12–17": 0, "18–25": 0, "26–35": 0, "36–50": 0, "51–65": 0, "66+": 0 };
                const now = new Date().getFullYear();
                jemaat.forEach(j => {
                    if (!j.tglLahir) return;
                    const age = now - parseInt(j.tglLahir.split("-")[0]);
                    if (age < 12) groups["<12"]++;
                    else if (age <= 17) groups["12–17"]++;
                    else if (age <= 25) groups["18–25"]++;
                    else if (age <= 35) groups["26–35"]++;
                    else if (age <= 50) groups["36–50"]++;
                    else if (age <= 65) groups["51–65"]++;
                    else groups["66+"]++;
                });
                return groups;
            }, [jemaat]);

            const genderBaptis = useMemo(() => ({
                lk_baptis: jemaat.filter(j => j.gender === "Laki-laki"  && j.statusBaptis === "Sudah Baptis").length,
                lk_belum:  jemaat.filter(j => j.gender === "Laki-laki"  && j.statusBaptis !== "Sudah Baptis").length,
                pr_baptis: jemaat.filter(j => j.gender === "Perempuan"  && j.statusBaptis === "Sudah Baptis").length,
                pr_belum:  jemaat.filter(j => j.gender === "Perempuan"  && j.statusBaptis !== "Sudah Baptis").length,
            }), [jemaat]);

            const memberAttendance = useMemo(() => {
                const last4 = sabbatList.slice(-4);
                return jemaat.map(j => ({
                    nama: j.nama,
                    hadir: last4.filter(tgl => absen.find(a => a.tanggal === tgl && a.jemaatNama === j.nama && a.sesi === "Sekolah Sabat" && a.status === "Hadir")).length,
                    total: last4.length,
                })).sort((a, b) => b.hadir - a.hadir);
            }, [jemaat, absen, sabbatList]);

            const trendLastDiff = totalHadirPerSabbat.length >= 2
                ? totalHadirPerSabbat[totalHadirPerSabbat.length-1] - totalHadirPerSabbat[totalHadirPerSabbat.length-2]
                : 0;

            useEffect(() => {
                if (!window.Chart || !trendRef.current || sabbatList.length === 0) return;
                destroyChart("trend");
                const ctx = trendRef.current.getContext('2d');
                
                // Dynamic styling based on theme
                const textColor = isDarkMode ? "rgba(255,255,255,0.7)" : "rgba(15,23,42,0.6)";
                const gridColor = isDarkMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)";
                
                // Gradients for line fill
                const gradientSS = ctx.createLinearGradient(0, 0, 0, 300);
                gradientSS.addColorStop(0, isDarkMode ? 'rgba(56, 189, 248, 0.4)' : 'rgba(55,138,221,0.3)');
                gradientSS.addColorStop(1, 'rgba(56, 189, 248, 0)');

                const gradientKh = ctx.createLinearGradient(0, 0, 0, 300);
                gradientKh.addColorStop(0, isDarkMode ? 'rgba(52, 211, 153, 0.4)' : 'rgba(29,158,117,0.3)');
                gradientKh.addColorStop(1, 'rgba(52, 211, 153, 0)');

                const labels = sabbatList.map(d => { const p = parseLocalDate(d); return p ? `${p.getDate()}/${p.getMonth()+1}` : d; });
                const pctSS = totalHadirPerSabbat.map(v => jemaat.length > 0 ? Math.round(v/jemaat.length*100) : 0);
                const pctKh = khotbahPerSabbat.map(v => jemaat.length > 0 ? Math.round(v/jemaat.length*100) : 0);
                
                let datasets = [];
                if (trendMode === "jumlah" || trendMode === "persen") {
                    const dataSS = trendMode === "jumlah" ? totalHadirPerSabbat : pctSS;
                    const dataKh = trendMode === "jumlah" ? khotbahPerSabbat : pctKh;
                    
                    datasets = [
                        { 
                            label: trendMode === "jumlah" ? "Sekolah Sabat" : "SS (%)", 
                            data: dataSS, 
                            borderColor: isDarkMode ? "#38bdf8" : "#2563eb", // Bright blue/cyan
                            backgroundColor: gradientSS, 
                            borderWidth: 3, 
                            pointBackgroundColor: isDarkMode ? "#fff" : "#2563eb",
                            pointBorderColor: isDarkMode ? "#38bdf8" : "#fff",
                            pointBorderWidth: 2,
                            pointRadius: 5, 
                            pointHoverRadius: 8,
                            tension: 0.4, // Smooth curve
                            fill: true 
                        },
                        { 
                            label: trendMode === "jumlah" ? "Khotbah" : "Khotbah (%)", 
                            data: dataKh, 
                            borderColor: isDarkMode ? "#34d399" : "#059669", // Bright emerald
                            backgroundColor: gradientKh, 
                            borderWidth: 3, 
                            pointBackgroundColor: isDarkMode ? "#fff" : "#059669",
                            pointBorderColor: isDarkMode ? "#34d399" : "#fff",
                            pointBorderWidth: 2,
                            pointRadius: 5, 
                            pointHoverRadius: 8,
                            tension: 0.4, // Smooth curve
                            fill: true, 
                            borderDash: [5,5] 
                        },
                    ];
                } else {
                    datasets = [
                        { label: "Hadir SS", data: totalHadirPerSabbat, type: "bar", backgroundColor: "rgba(56, 189, 248, 0.6)", borderRadius: 4, yAxisID: "y" },
                        { label: "% Khotbah", data: pctKh, type: "line", borderColor: isDarkMode ? "#34d399" : "#059669", borderWidth: 3, pointBackgroundColor: "#fff", pointRadius: 5, tension: 0.4, yAxisID: "y2" },
                    ];
                }

                const scalesObj = {
                    x: { 
                        grid: { color: gridColor, drawBorder: false, borderDash: [5, 5] }, // Vertical drop lines
                        ticks: { color: textColor, font: { size: 11, family: 'Inter' } } 
                    },
                    y: {

                    if (overrideData.keterlibatan !== undefined) payload.keterlibatan = overrideData.keterlibatan;
                    if (overrideData.tamuTambahan !== undefined) payload.tamuTambahan = overrideData.tamuTambahan;
                    if (overrideData.doaList !== undefined) payload.doaList = overrideData.doaList;

                    const res = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST', redirect: 'follow',
                        body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const json = await res.json();
                    if (json.success) showToast("Data tersimpan di Database Cloud!", "success");
                    else showToast("Gagal menyimpan: " + json.error, "error");
                } catch (err) {
                    showToast("Gagal terhubung ke Cloud. Tersimpan di lokal.", "warning");
                } finally { setIsSyncing(false); }
            };

            const processAndSetData = (d) => {
                if (d.jemaat) setJemaat(d.jemaat.map((j, idx) => ({ ...j, id: j.id || `J_${Date.now()}_${idx}_${Math.random().toString(36).substr(2, 4)}`, tglLahir: cleanDateString(j.tglLahir) })));
                if (d.kelas) setKelas(d.kelas);
                if (d.subKelas) setSubKelas(d.subKelas);
                if (d.users) {
                    const adminRecord = d.users.find(u => u.nama === "Admin Utama (Backup PIN)");
                    if (adminRecord) setAdminPin(adminRecord.pin);
                    setUsers(d.users.filter(u => u.nama !== "Admin Utama (Backup PIN)"));
                }
                if (d.absen) {
                    const rawAbsen = d.absen.map(a => ({ ...a, tanggal: cleanDateString(a.tanggal) }));
                    const jSubMap = {};
                    if (d.jemaat) d.jemaat.forEach(j => { if (j.nama) jSubMap[j.nama] = j.subKelasNama; });
                    
                    const absenBiasa = rawAbsen.filter(a => a.jemaatNama !== "Tamu Tambahan");
                    const tamuRows   = rawAbsen.filter(a => a.jemaatNama === "Tamu Tambahan" && (parseInt(a.status) || 0) > 0);

                    const subKelasOrder = (d.subKelas || []).map(s => s.nama);
                    const activeSubs = {};
                    for (const a of absenBiasa) {
                        if (a.sesi !== "Sekolah Sabat") continue;
                        const key = a.tanggal;
                        if (!activeSubs[key]) activeSubs[key] = new Set();
                        const sub = jSubMap[a.jemaatNama];
                        if (sub) activeSubs[key].add(sub);
                    }

                    const tamuSSByDate = {};
                    const resolvedTamu = [];

                    for (const t of tamuRows) {
                        const jumlah = parseInt(t.status) || 0;
                        if (t.sesi === "Khotbah") resolvedTamu.push({ tanggal: t.tanggal, sesi: "Khotbah", subKelasNama: "Kebaktian Khotbah (Umum)", jumlah });
                        else if (t.subKelasNama && t.subKelasNama !== "_ALL_") resolvedTamu.push({ tanggal: t.tanggal, sesi: t.sesi, subKelasNama: t.subKelasNama, jumlah });
                        else {
                            if (!tamuSSByDate[t.tanggal]) tamuSSByDate[t.tanggal] = [];
                            tamuSSByDate[t.tanggal].push(jumlah);
                        }
                    }

                    for (const [tgl, jumlahList] of Object.entries(tamuSSByDate)) {
                        const activeForDate = subKelasOrder.filter(s => activeSubs[tgl] && activeSubs[tgl].has(s));
                        if (activeForDate.length === jumlahList.length) {
                            jumlahList.forEach((jumlah, i) => { if (jumlah > 0) resolvedTamu.push({ tanggal: tgl, sesi: "Sekolah Sabat", subKelasNama: activeForDate[i], jumlah }); });
                        } else {
                            activeForDate.forEach((subNama, i) => {
                                const jumlah = jumlahList[i] !== undefined ? jumlahList[i] : jumlahList[0];
                                if (jumlah > 0) resolvedTamu.push({ tanggal: tgl, sesi: "Sekolah Sabat", subKelasNama: subNama, jumlah });
                            });
                        }
                    }
                    setAbsen(absenBiasa); setTamuTambahan(resolvedTamu);
                }
                if (d.keterlibatan) setKeterlibatan(d.keterlibatan.map(k => ({ ...k, tanggal: cleanDateString(k.tanggal) })));
                if (d.doaList) setDoaList(d.doaList.map(doa => ({ ...doa, tanggal: cleanDateString(doa.tanggal) || doa.tanggal, permohonan: (doa.permohonan || "").replace(/ \| /g, "\n").replace(/\|/g, "\n") })).sort((a, b) => Number(String(b.id || "").replace("D", "")) - Number(String(a.id || "").replace("D", ""))));
            };

            const handlePullFromCloud = async (silent = false) => {
                if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("ISI_DENGAN_URL")) return;

                if (!silent && jemaat.length === 0) {
                    try {
                        const cached = localStorage.getItem('pisgah_data_cache');
                        if (cached) { processAndSetData(JSON.parse(cached)); }
                    } catch(e) {}
                }

                setIsSyncing(true);
                if (!silent) showToast("Sinkronisasi... Menarik data terbaru", "info");
                try {
                    const bypassUrl = `${APPS_SCRIPT_URL}?_=${Date.now()}`;
                    const res  = await fetch(bypassUrl);
                    const json = await res.json();
                    if (json.success && json.data) {
                        processAndSetData(json.data);
                        localStorage.setItem('pisgah_data_cache', JSON.stringify(json.data));
                        if (!silent) showToast("Sinkronisasi Berhasil!", "success");

                if (!isMulti) return getSabbatsInMonth(monthStart);
                const [sy, sm] = monthStart.split('-').map(Number);
                const [ey, em] = monthEnd.split('-').map(Number);
                if (ey < sy || (ey === sy && em < sm)) return getSabbatsInMonth(monthStart);
                const sabbats = [];
                let cy = sy, cm = sm;
                while (cy < ey || (cy === ey && cm <= em)) {
                    const month = String(cm).padStart(2, '0');
                    getSabbatsInMonth(`${cy}-${month}`).forEach(s => sabbats.push(s));
                    cm++; if (cm > 12) { cm = 1; cy++; }
                }
                return sabbats;
            };

                setUsers(nextUsers); setUserModal({ isOpen: false, mode: 'create', data: null });
                pushDataToCloud({ users: nextUsers });
            };

            const deleteUser = (nama) => {
                triggerConfirm("Hapus Petugas", "Apakah Anda yakin ingin menghapus akun guru ini?", () => {
                    const nextUsers = users.filter(u => u.nama !== nama);
                    setUsers(nextUsers); showToast("User telah dihapus.", "warning"); pushDataToCloud({ users: nextUsers });
                });

            const saveKelasOrSubKelas = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                let nextK = [...kelas], nextS = [...subKelas], nextJ = [...jemaat], nextU = [...users], nextKet = [...keterlibatan], nextTamu = [...tamuTambahan];
                let isCascade = false;

                if (kelasModal.type === 'kelas') {

                    if (kelas.some(k => k.nama.toLowerCase() === kelasNama.toLowerCase() && (kelasModal.mode === 'create' || k.nama !== kelasModal.data.nama))) { showToast("Nama Kelas sudah ada!", "error"); return; }

                    else {

                        if (oldNama !== kelasNama) {

                            nextJ = jemaat.map(j => j.kelasNama === oldNama ? { ...j, kelasNama: kelasNama } : j);

                    if (kelasModal.mode === 'create') { nextS = [...subKelas, { nama: subNama, kelasNama: parentKelasNama }]; showToast(`Sub-kelas "${subNama}" dibuat!`, "success"); }

                        nextAbsen = [...filteredAbsen, ...deltaAbsen]; setAbsen(nextAbsen); showToast(`Absen Sekolah Sabat ${activeSubNama} disimpan.`, "success");
                    }
                    const filteredTamu = tamuTambahan.filter(t => !(t.tanggal === selectedSabbatDate && t.sesi === selectedSession && (t.subKelasNama === activeSubNama || t.subKelasNama === "_ALL_")));
                    const tamuRecord = { tanggal: selectedSabbatDate, sesi: selectedSession, subKelasNama: activeSubNama, jumlah: parseInt(tamuDraft) || 0 };
                    setTamuTambahan([...filteredTamu, tamuRecord]);
                    pushDataToCloud({ absen: deltaAbsen, tamuTambahan: [tamuRecord] });
                };
                if (!isSabbat(selectedSabbatDate)) triggerConfirm("Konfirmasi Tanggal", "Tanggal terpilih bukan Sabat. Tetap simpan?", () => performSave());
                else performSave();
            };

            const handleSaveKeterlibatan = () => {
                const activeSubNama = currentUserRole === "user" ? loggedInUser.subKelasNama : selectedSubKelasNama;
                const performSave = () => {
                    const filteredKeterlibatan = keterlibatan.filter(k => !(k.tanggal === selectedSabbatDate && k.subKelasNama === activeSubNama));
                    const deltaRecord = { tanggal: selectedSabbatDate, subKelasNama: activeSubNama, values: { ...keterlibatanDraft } };
                    setKeterlibatan([...filteredKeterlibatan, deltaRecord]); showToast(`10 Indikator Keterlibatan Kelas diperbarui.`, "success");
                    pushDataToCloud({ keterlibatan: [deltaRecord] });
                };
                if (!isSabbat(selectedSabbatDate)) triggerConfirm("Konfirmasi Tanggal", "Tanggal bukan Sabat. Tetap simpan draf?", () => performSave());
                else performSave();
            };

            const handleSort = (col) => { if (sortBy === col) setSortOrder(sortOrder === "asc" ? "desc" : "asc"); else { setSortBy(col); setSortOrder("asc"); } };

            const filteredJemaatList = useMemo(() => {
                return jemaat.filter(j => {
                    return (j.nama || "").toLowerCase().includes((searchJemaat || "").toLowerCase()) &&
                        (filterKelas === "all" || j.kelasNama === filterKelas) &&
                        (filterGender === "all" || j.gender === filterGender) &&
                        (filterBaptis === "all" || j.statusBaptis === filterBaptis);
                }).sort((a, b) => {
                    let aVal = a.nama.toLowerCase(), bVal = b.nama.toLowerCase();
                    if (sortBy === "gender") { aVal = a.gender; bVal = b.gender; }
                    else if (sortBy === "statusBaptis") { aVal = a.statusBaptis; bVal = b.statusBaptis; }
                    else if (sortBy === "subKelas") { aVal = a.subKelasNama; bVal = b.subKelasNama; }
                    if (aVal < bVal) return sortOrder === "asc" ? -1 : 1;
                    if (aVal > bVal) return sortOrder === "asc" ? 1 : -1;
                    return 0;
                });
            }, [jemaat, searchJemaat, filterKelas, filterGender, filterBaptis, sortBy, sortOrder]);

            const metrics = useMemo(() => {
                const total = jemaat.length, baptisCount = jemaat.filter(j => j.statusBaptis === "Sudah Baptis").length;
                const jemaatAktif = jemaat.filter(j => (j.statusJemaat || "").includes("Jemaat") || (j.statusJemaat || "").includes("Anggota Sekolah Sabat")).length;
                const uniqueSabbaths = [...new Set(absen.map(a => a.tanggal))].sort();
                const lastSabbat = uniqueSabbaths[uniqueSabbaths.length - 1];
                
                const registeredTamuCount = jemaat.filter(j => (j.statusJemaat || "").toLowerCase().includes("tamu")).length;
                const extraGuestsCount = lastSabbat ? tamuTambahan.filter(t => t.tanggal === lastSabbat && t.sesi === "Sekolah Sabat").reduce((sum, g) => sum + (g.jumlah || 0), 0) : 0;
                const registeredGuestsHadir = lastSabbat ? absen.filter(a => a.tanggal === lastSabbat && a.sesi === "Sekolah Sabat" && a.status === "Hadir" && jemaat.some(j => j.nama === a.jemaatNama && (j.statusJemaat || "").toLowerCase().includes("tamu"))).length : 0;
                const totalTamuSabatIni = extraGuestsCount + registeredGuestsHadir;

                let avgRate = 0;
                const uniqueSabbatSess = [...new Set(absen.filter(a => a.sesi === "Sekolah Sabat").map(a => a.tanggal))].sort().slice(-3);
                if (uniqueSabbatSess.length > 0) {
                    let totalPresents = 0;
                    uniqueSabbatSess.forEach(sabDate => { 
                        const fromAbsen = absen.filter(a => a.tanggal === sabDate && a.status === "Hadir" && a.sesi === "Sekolah Sabat").length;
                        const fromTamu = tamuTambahan.filter(t => t.tanggal === sabDate && t.sesi === "Sekolah Sabat").reduce((sum, g) => sum + (g.jumlah || 0), 0);
                        totalPresents += ((fromAbsen + fromTamu) / (total || 1)) * 100; 
                    });
                    avgRate = Math.round(totalPresents / uniqueSabbatSess.length);
                }
                return { total, baptisPersen: total > 0 ? Math.round((baptisCount / total) * 100) : 0, jemaatAktif, tamuCount: { registered: registeredTamuCount, extra: extraGuestsCount, hadirSabatIni: totalTamuSabatIni, total: registeredTamuCount + extraGuestsCount }, avgRate };
            }, [jemaat, absen, tamuTambahan]);

            const liveReportPreview = useMemo(() => {
                const sabbatDates = getSabbatsInRange(reportMonth, reportMonthEnd, isMultiMonth);
                if (sabbatDates.length === 0) return null;

                let targetCategoryName = "Semua Kelas Utama";
                if (reportType === "presensi") {
                    if (currentUserRole === 'user') targetCategoryName = loggedInUser.subKelasNama;
                    else if (reportKelasFilter !== 'all') targetCategoryName = reportKelasFilter;
                } else {
                    targetCategoryName  = currentUserRole === 'user' ? loggedInUser.subKelasNama : reportSubKelasFilter;
                }

                if (reportType === "presensi") {
                    let reportJemaatList = currentUserRole === 'user'
                        ? (loggedInUser.subKelasNama === "Kebaktian Khotbah (Umum)" ? jemaat : jemaat.filter(j => j.subKelasNama === loggedInUser.subKelasNama))
                        : (reportKelasFilter === 'all' ? jemaat : jemaat.filter(j => j.kelasNama === reportKelasFilter));

                    const sortedJemaat = [...reportJemaatList].sort((a, b) => a.nama.localeCompare(b.nama));
                    const anggotaAsli = sortedJemaat.filter(j => !(j.statusJemaat || "").toLowerCase().includes("tamu"));
                    const tamuTerdaftar = sortedJemaat.filter(j => (j.statusJemaat || "").toLowerCase().includes("tamu"));
                    
                    const processJemaatToRow = (jemaatArray, isGuestFlag) => {
                        return jemaatArray.map((j) => {
                            let th = 0, ta = 0;
                            const statusList = sabbatDates.map(date => {
                                const att = absen.find(a => a.tanggal === date && a.jemaatNama === j.nama && a.sesi === reportSession);
                                const s   = att ? att.status : '-';
                                if (s === 'Hadir') th++; else if (s === 'Alpa') ta++;
                                return s;
                            });
                            return { nama: j.nama, status: j.statusJemaat || "Jemaat", statusList, hadirCount: th, alpaCount: ta, isRegisteredGuest: isGuestFlag };
                        });
                    };

                    const baseRows = processJemaatToRow(anggotaAsli, false);
                    const guestRows = processJemaatToRow(tamuTerdaftar, true);

                    let totalTamuBulanIni = 0;
                    const guestStatusList = sabbatDates.map(date => {
                        const count = tamuTambahan.filter(t => {
                            if (t.tanggal !== date || t.sesi !== reportSession) return false;
                            if (t.subKelasNama === "_ALL_") return true;
                            if (currentUserRole === 'user') return t.subKelasNama === loggedInUser.subKelasNama || t.subKelasNama === "Kebaktian Khotbah (Umum)";
                            if (reportKelasFilter === 'all') return true;
                            if (t.subKelasNama === "Kebaktian Khotbah (Umum)") return reportSession === "Khotbah";
                            return subKelas.find(s => s.nama === t.subKelasNama)?.kelasNama === reportKelasFilter;
                        }).reduce((sum, g) => sum + (g.jumlah || 0), 0);
                        totalTamuBulanIni += count;
                        return count || 0;
                    });

                    const finalRows = [];
                    baseRows.forEach((r, i) => finalRows.push({ ...r, no: i + 1 }));

                    // Sisipkan area khusus tamu jika ada tamu
                    if (guestRows.length > 0 || Math.max(...guestStatusList) > 0) {
                        finalRows.push({
                            no: "", nama: "", status: "--- DAFTAR TAMU ---",
                            statusList: Array(sabbatDates.length).fill(""), hadirCount: "", alpaCount: "", isSeparatorRow: false 
                        });
                        guestRows.forEach((r, i) => finalRows.push({ ...r, no: baseRows.length + i + 1 }));

                        finalRows.push({
                            no: baseRows.length + guestRows.length + 1, nama: "Tamu (Angka Tambahan)", status: "Tamu",
                            statusList: guestStatusList, hadirCount: totalTamuBulanIni, alpaCount: "-", isTamuTambahan: true
                        });
                    }

                    // PERHITUNGAN TOTAL DI BAWAH
                    const totalHadirAnggotaList = sabbatDates.map((date, dateIndex) => {
                        let count = 0;
                        baseRows.forEach(row => { if (row.statusList[dateIndex] === 'Hadir') count++; });
                        return count;
                    });

                    const totalHadirTamuList = sabbatDates.map((date, dateIndex) => {
                        let count = 0;
                        guestRows.forEach(row => { if (row.statusList[dateIndex] === 'Hadir') count++; });
                        return count + guestStatusList[dateIndex];
                    });

                    const totalAlpaAnggotaList = sabbatDates.map((date, dateIndex) => {
                        let count = 0;
                        baseRows.forEach(row => { if (row.statusList[dateIndex] === 'Alpa') count++; });
                        return count;
                    });

                    finalRows.push({
                        no: "", nama: "TOTAL HADIR (Hanya Anggota)", status: "",
                        statusList: totalHadirAnggotaList, hadirCount: totalHadirAnggotaList.reduce((a,b)=>a+b,0), alpaCount: "-", isTotalRow: true, totalType: "hadir-anggota"
                    });

                    finalRows.push({
                        no: "", nama: "TOTAL TAMU (Terdaftar + Angka)", status: "",
                        statusList: totalHadirTamuList, hadirCount: totalHadirTamuList.reduce((a,b)=>a+b,0), alpaCount: "-", isTotalRow: true, totalType: "tamu-bawah"
                    });

                    const totalSemuaList = totalHadirAnggotaList.map((val, i) => val + totalHadirTamuList[i]);
                    finalRows.push({
                        no: "", nama: "TOTAL KESELURUHAN (Anggota + Tamu)", status: "",
                        statusList: totalSemuaList, hadirCount: totalSemuaList.reduce((a,b)=>a+b,0), alpaCount: "-", isTotalRow: true, totalType: "hadir-semua"
                    });

                    finalRows.push({
                        no: "", nama: "TOTAL ALPA (Anggota)", status: "",
                        statusList: totalAlpaAnggotaList, hadirCount: "-", alpaCount: totalAlpaAnggotaList.reduce((a,b)=>a+b,0), isTotalRow: true, totalType: "alpa"
                    });

                    const headers = ["No", "Nama Jemaat", "Status"];
                    sabbatDates.forEach(date => {
                        const d = parseLocalDate(date);
                        headers.push(d ? `${d.getDate()}/${d.getMonth() + 1}` : '');
                    });
                    headers.push("Hadir", "Alpa");
                    return { headers, rows: finalRows, targetCategoryName, sabbatDates };
                } else {
                    const activeSubNama = currentUserRole === 'user' ? loggedInUser.subKelasNama : reportSubKelasFilter;
                    const rows = KEGIATAN_KETERLIBATAN.map(keg => {
                        let tot = 0;
                        const statusList = sabbatDates.map(date => {
                            const rec = keterlibatan.find(k => k.tanggal === date && k.subKelasNama === activeSubNama);
                            const val = rec?.values?.[keg.id] !== undefined ? rec.values[keg.id] : 0;
                            tot += val; return val;
                        });
                        return { no: keg.id, kegiatan: keg.text, statusList, total: tot };
                    });
                    const headers = ["NO", "KEGIATAN UTAMA KETERLIBATAN"];
                    sabbatDates.forEach(date => { const d = parseLocalDate(date); headers.push(d ? `Sabat (${d.getDate()})` : ''); });
                    headers.push("TOTAL");
                    return { headers, rows, targetCategoryName, sabbatDates };
                }
            }, [reportMonth, reportMonthEnd, isMultiMonth, reportType, reportSession, reportKelasFilter, reportSubKelasFilter, jemaat, absen, tamuTambahan, keterlibatan, currentUserRole, loggedInUser, subKelas]);

            const handleExportPDF = async () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                const sabbatDates = getSabbatsInRange(reportMonth, reportMonthEnd, isMultiMonth);
                if (sabbatDates.length === 0) { showToast("Bulan ini tidak memiliki hari Sabat.", "error"); return; }
                if (!liveReportPreview) return;

                let logoDataUrl = null;
                try {
                    logoDataUrl = await new Promise((resolve, reject) => {
                        const img = new Image(); img.crossOrigin = "Anonymous"; img.src = "./icons/PisgahColor.png";
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                            canvas.getContext('2d').drawImage(img, 0, 0); resolve(canvas.toDataURL('image/png'));
                        };
                        img.onerror = () => reject(new Error('Logo gagal dimuat'));
                    });
                } catch (err) {}

                const logoX = 10, logoY = 6, logoW = 18, logoH = 18;
                if (logoDataUrl) doc.addImage(logoDataUrl, 'PNG', logoX, logoY, logoW, logoH);
                else {
                    doc.setDrawColor(200, 200, 200); doc.setFillColor(240, 240, 240); doc.circle(logoX + logoW / 2, logoY + logoH / 2, 9, 'FD');
                    doc.setTextColor(100, 100, 100); doc.setFontSize(12); doc.text('⛪', logoX + logoW / 2 - 3, logoY + logoH / 2 + 3);
                }

                const startX = 34;
                doc.setTextColor(0, 0, 0); doc.setFont("Helvetica", "bold"); doc.setFontSize(13);
                const judulPDF = reportType === "presensi" ? `LAPORAN REKAPITULASI PRESENSI ${reportSession.toUpperCase()}` : `LAPORAN 10 INDIKATOR KETERLIBATAN KELAS`;
                doc.text(judulPDF, startX, 15);
                doc.setFontSize(9); doc.setTextColor(50, 50, 50);
                doc.text(`KATEGORI KELAS: ${liveReportPreview.targetCategoryName.toUpperCase()}`, startX, 20);
                doc.setTextColor(100, 100, 100);
                const labelBulan = isMultiMonth ? `Periode: ${reportMonth} s/d ${reportMonthEnd}` : `Bulan: ${reportMonth}`;
                doc.text(`GMAHK PISGAH BISDAC  |  ${labelBulan}`, startX, 24);
                doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.5); doc.line(14, 28, 283, 28);
                const fileSuffix = isMultiMonth ? `${reportMonth}_sd_${reportMonthEnd}` : reportMonth;

                if (reportType === "presensi") {
                    const tableBody = liveReportPreview.rows.map(row => {
                        if (row.isTotalRow) {
                            return [{ content: row.nama, colSpan: 3, styles: { halign: 'right', fontStyle: 'bold' } }, ...row.statusList, row.hadirCount, row.alpaCount];
                        }
                        if (row.isSeparatorRow) {
                            return [{ content: row.nama, colSpan: 3 + sabbatDates.length + 2, styles: { halign: 'center', fontStyle: 'bold', fillColor: [255, 245, 230], textColor: [150, 100, 0] } }];
                        }
                        return [row.no, row.nama, row.status, ...row.statusList, row.hadirCount, row.alpaCount];
                    });

                    doc.autoTable({
                        startY: 32, head: [liveReportPreview.headers], body: tableBody, theme: 'grid',
                        headStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold', halign: 'center' },
                        bodyStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], lineColor: [200, 200, 200] },
                        alternateRowStyles: { fillColor: [248, 248, 248] },
                        columnStyles: { 0: { cellWidth: 10 }, 1: { cellWidth: 55 }, 2: { cellWidth: 32 } },
                        styles: { fontSize: 8.5, cellPadding: 2 },
                        didParseCell: (data) => {
                            const rawRow = data.row.raw;
                            const isTotalRow = rawRow[0] && typeof rawRow[0] === 'object' && rawRow[0].styles && rawRow[0].styles.halign === 'right';
                            
                            if (isTotalRow) {
                                const rowName = String(rawRow[0].content).toUpperCase();
                                data.cell.styles.fontStyle = 'bold';
                                
                                if (rowName.includes("KESELURUHAN")) {
                                    data.cell.styles.fillColor = [210, 240, 210];
                                    data.cell.styles.textColor = [0, 80, 30];
                                } else if (rowName.includes("TOTAL TAMU")) {
                                    data.cell.styles.fillColor = [255, 225, 180];
                                    data.cell.styles.textColor = [120, 60, 0];
                                } else if (rowName.includes("HADIR")) {
                                    data.cell.styles.fillColor = [235, 248, 235];
                                    data.cell.styles.textColor = [0, 120, 50];
                                } else if (rowName.includes("ALPA")) {
                                    data.cell.styles.fillColor = [250, 230, 230];
                                    data.cell.styles.textColor = [180, 40, 40];
                                }
                            } else if (rawRow[1] === "Tamu (Angka Tambahan)") {
                                data.cell.styles.fillColor = [255, 225, 180]; data.cell.styles.textColor = [120, 60, 0]; data.cell.styles.fontStyle = 'bold';
                            } else if (rawRow[0] && typeof rawRow[0] !== 'object') {
                                if (data.column.index >= 3 && data.column.index < 3 + sabbatDates.length) {
                                    const status = data.cell.text[0];
                                    if (status === "Hadir") data.cell.styles.textColor = [0, 140, 60];
                                    else if (status === "Alpa") data.cell.styles.textColor = [200, 30, 30];
                                    else data.cell.styles.textColor = [160, 160, 160];
                                }
                            }
                        }
                    });
                    doc.save(`Laporan_Presensi_${fileSuffix}.pdf`);
                } else {
                    const tableBody = liveReportPreview.rows.map(row => [row.no, row.kegiatan, ...row.statusList, row.total]);
                    doc.autoTable({
                        startY: 32, head: [liveReportPreview.headers], body: tableBody, theme: 'grid',
                        headStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold', halign: 'center' },
                        bodyStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], lineColor: [200, 200, 200] },
                        alternateRowStyles: { fillColor: [248, 248, 248] }, styles: { fontSize: 8.5, cellPadding: 2 }
                    });
                    doc.save(`Laporan_Keterlibatan_${fileSuffix}.pdf`);
                }
                showToast("Laporan PDF Berhasil Diunduh!", "success");
            };

            const handleExportExcel = () => {
                if (!window.XLSX) { showToast("Library Excel belum dimuat.", "error"); return; }
                const sabbatDates = getSabbatsInRange(reportMonth, reportMonthEnd, isMultiMonth);
                if (sabbatDates.length === 0) { showToast("Bulan ini tidak memiliki hari Sabat.", "error"); return; }
                if (!liveReportPreview) return;

                const { headers, rows, targetCategoryName } = liveReportPreview;
                const aoa = [];
                
                const judul = reportType === "presensi" ? `LAPORAN REKAPITULASI PRESENSI ${reportSession.toUpperCase()}` : `LAPORAN 10 INDIKATOR KETERLIBATAN KELAS`;
                const labelBulan = isMultiMonth ? `Periode: ${reportMonth} s/d ${reportMonthEnd}` : `Bulan: ${reportMonth}`;
                
                aoa.push([judul]);
                aoa.push([`Kategori: ${targetCategoryName.toUpperCase()}`]);
                aoa.push([`GMAHK PISGAH BISDAC | ${labelBulan}`]);
                aoa.push([]); 

                aoa.push(headers);

                // Tambahkan Data Tabel
                if (reportType === "presensi") {
                    rows.forEach(row => {
                        if (row.isTotalRow) {
                            aoa.push([row.nama, "", "", ...row.statusList, row.hadirCount, row.alpaCount]);
                        } else if (row.isSeparatorRow) {
                            aoa.push([row.nama]);
                        } else {
                            aoa.push([row.no, row.nama, row.status, ...row.statusList, row.hadirCount, row.alpaCount]);
                        }
                    });
                } else {
                    rows.forEach(row => {
                        aoa.push([row.no, row.kegiatan, ...row.statusList, row.total]);
                    });
                }

                const ws = window.XLSX.utils.aoa_to_sheet(aoa);
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Laporan");

                const fileSuffix = isMultiMonth ? `${reportMonth}_sd_${reportMonthEnd}` : reportMonth;
                const fileName = reportType === "presensi" ? `Laporan_Presensi_${fileSuffix}.xlsx` : `Laporan_Keterlibatan_${fileSuffix}.xlsx`;

                window.XLSX.writeFile(wb, fileName);
                showToast("Laporan Excel Berhasil Diunduh!", "success");
            };

            return (
                <div className="min-h-screen flex flex-col relative pb-safe">
                    {toast.show && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[999999] px-5 md:px-6 py-3.5 shadow-2xl flex items-center gap-3 animate-toast w-max max-w-[90vw] rounded-full border backdrop-blur-xl ${
                            toast.type === 'error' ? 'bg-rose-50/95 dark:bg-rose-950/95 border-rose-500/50 text-rose-600 dark:text-rose-400 shadow-rose-500/20' :
                            toast.type === 'warning' ? 'bg-amber-50/95 dark:bg-amber-950/95 border-amber-500/50 text-amber-600 dark:text-amber-400 shadow-amber-500/20' :
                            toast.type === 'info' ? 'bg-blue-50/95 dark:bg-blue-950/95 border-blue-500/50 text-blue-600 dark:text-blue-400 shadow-blue-500/20' :
                            'bg-emerald-50/95 dark:bg-emerald-950/95 border-emerald-500/50 text-emerald-600 dark:text-emerald-400 shadow-emerald-500/20'
                        }`}>
                            <i className={`text-xl md:text-2xl ${
                                toast.type === 'error' ? 'fa-solid fa-circle-xmark' :
                                toast.type === 'warning' ? 'fa-solid fa-triangle-exclamation' :
                                toast.type === 'info' ? 'fa-solid fa-circle-info' :
                                'fa-solid fa-circle-check'
                            } animate-bounce`}></i>
                            <span className="text-slate-900 dark:text-slate-100 font-extrabold text-sm md:text-base leading-tight tracking-wide">{toast.message}</span>
                        </div>
                    )}

                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-[200] p-4">
                            <div className="bg-white dark:bg-slate-900/95 border border-slate-200 dark:border-amber-500/30 rounded-3xl w-full max-w-sm md:max-w-md p-6 text-slate-900 dark:text-slate-100 shadow-2xl animate-fadeIn">
                                <h4 className="font-extrabold text-lg text-amber-600 dark:text-amber-400 mb-2">{confirmModal.title}</h4>
                                <p className="text-sm text-slate-600 dark:text-slate-300 mb-6">{confirmModal.message}</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setConfirmModal({ isOpen: false, title: "", message: "", onConfirm: null })} className="px-5 py-3 text-xs md:text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition">Batal</button>
                                    <button onClick={confirmModal.onConfirm} className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black text-xs md:text-sm px-6 py-3 rounded-xl transition active:scale-95 shadow-lg shadow-amber-500/20">Lanjutkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}

                                    <div className="flex justify-end gap-3 pt-5 border-t border-slate-200 dark:border-white/5">
                                        <button type="button" onClick={() => setJemaatModal({ isOpen: false, mode: 'create', data: null })} className="px-6 py-3.5 rounded-xl font-bold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition text-sm">Batal</button>
                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-3.5 rounded-xl transition active:scale-95 text-sm shadow-lg shadow-amber-500/20"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Simpan Data</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal User */}
                    {userModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 rounded-3xl w-full max-w-md p-6 md:p-8 space-y-5 shadow-2xl animate-fadeIn relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
                                <h3 className="font-extrabold text-amber-600 dark:text-amber-400 text-xl flex items-center gap-2 relative z-10"><i className="fa-solid fa-user-shield"></i> {userModal.mode === 'create' ? 'Tambah Guru Baru' : 'Edit Guru'}</h3>
                                <form onSubmit={saveUser} className="space-y-5 relative z-10">
                                    <div><label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Nama Guru *</label><input type="text" name="nama" required defaultValue={userModal.mode === 'edit' ? userModal.data.nama : ''} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 p-3.5 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-amber-500 shadow-inner" /></div>
                                    <div>
                                        <label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Penugasan Kelas *</label>
                                        <select name="subKelasNama" required defaultValue={userModal.mode === 'edit' ? userModal.data.subKelasNama : ''} className="w-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white p-3.5 rounded-xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-amber-500 shadow-inner">
                                            <option value="" disabled hidden>Pilih Penugasan...</option>
                                            <option value="Kebaktian Khotbah (Umum)">Khotbah (Umum)</option>
                                            {subKelas.map(s => <option key={s.nama} value={s.nama}>{s.nama}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">PIN Akses *</label><input type={showUserModalPin ? "text" : "password"} name="pin" required defaultValue={userModal.mode === 'edit' ? userModal.data.pin : ''} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 p-3.5 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-amber-500 font-mono tracking-widest text-lg shadow-inner" placeholder="••••" /></div>
                                    <div className="flex items-center gap-3 select-none pt-1"><input type="checkbox" id="toggleUserModalPin" checked={showUserModalPin} onChange={(e) => setShowUserModalPin(e.target.checked)} className="w-5 h-5 md:w-4 md:h-4 rounded accent-amber-500" /><label htmlFor="toggleUserModalPin" className="text-slate-600 dark:text-slate-300 text-sm md:text-xs cursor-pointer font-bold">Tampilkan PIN</label></div>
                                    <div className="flex justify-end gap-3 pt-5 border-t border-slate-200 dark:border-white/5">
                                        <button type="button" onClick={() => setUserModal({ isOpen: false, mode: 'create', data: null })} className="px-6 py-3.5 rounded-xl font-bold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition text-sm">Batal</button>
                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-3.5 rounded-xl transition active:scale-95 text-sm shadow-lg shadow-amber-500/20"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Simpan PIN</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Kelas */}
                    {kelasModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 rounded-3xl w-full max-w-sm p-6 md:p-8 space-y-5 shadow-2xl animate-fadeIn relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
                                <h3 className="font-extrabold text-amber-600 dark:text-amber-400 text-xl flex items-center gap-2 relative z-10"><i className="fa-solid fa-layer-group"></i> {kelasModal.mode === 'create' ? 'Tambah ' : 'Edit '}{kelasModal.type === 'kelas' ? 'Kelas Induk' : 'Sub-Kelas'}</h3>
                                <form onSubmit={saveKelasOrSubKelas} className="space-y-5 relative z-10">
                                    {kelasModal.type === 'kelas' ? (
                                        <div><label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Nama Kelas Induk *</label><input type="text" name="namaKelas" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.nama : ''} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 p-3.5 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-amber-500 shadow-inner" placeholder="Contoh: Dewasa" /></div>
                                    ) : (
                                        <>
                                            <div><label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Nama Sub-Kelas *</label><input type="text" name="namaSubKelas" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.nama : ''} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 p-3.5 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-amber-500 shadow-inner" placeholder="Contoh: Dewasa 1" /></div>
                                            <div>
                                                <label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Kelas Induk *</label>
                                                <select name="parentKelasNama" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.kelasNama : ''} className="w-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white p-3.5 rounded-xl border border-slate-300 dark:border-slate-700 shadow-inner focus:outline-none focus:border-amber-500">
                                                    <option value="" disabled hidden>Pilih Kelas Induk...</option>
                                                    {kelas.map(k => <option key={k.nama} value={k.nama}>{k.nama}</option>)}
                                                </select>
                                            </div>
                                        </>
                                    )}
                                    <div className="flex justify-end gap-3 pt-5 border-t border-slate-200 dark:border-white/5">
                                        <button type="button" onClick={() => setKelasModal({ isOpen: false, mode: 'create', data: null, type: 'kelas' })} className="px-6 py-3.5 rounded-xl font-bold text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition text-sm">Batal</button>
                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-3.5 rounded-xl transition active:scale-95 text-sm shadow-lg shadow-amber-500/20"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Simpan Data</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
