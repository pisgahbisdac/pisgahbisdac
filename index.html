<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Presensi Gereja - Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #1d4ed8;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-blue-900 text-white p-6 shadow-md">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fas fa-file-excel text-green-400 text-3xl"></i>
                <div>
                    <h1 class="text-xl font-bold uppercase tracking-tight">Sinkronisasi Google Sheets</h1>
                    <p class="text-xs text-blue-200">ID: 1-fWE3bjOlTU...zc</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- Tombol Buka Spreadsheet Langsung -->
                <a href="https://docs.google.com/spreadsheets/d/1-fWE3bjOlTU9VFITCgI6smG8d__vxjWpVMN35ODb-zc/edit" 
                   target="_blank" 
                   class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-lg border border-green-500">
                    <i class="fas fa-external-link-alt text-[10px]"></i>
                    Buka Spreadsheet
                </a>
                <div class="bg-blue-800 px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-blue-700">
                    <span id="statusDot" class="w-2 h-2 bg-gray-400 rounded-full animate-pulse"></span>
                    <span id="statusText">Menghubungkan...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Kolom Input Anggota -->
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-gray-800 font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-user-plus text-blue-600"></i>
                        Anggota Baru
                    </h2>
                    <form id="addMemberForm" class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Nama Jemaat</label>
                            <input type="text" id="inputName" required placeholder="Contoh: Budi Santoso"
                                class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <button type="submit" id="addBtn"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all flex justify-center items-center gap-2">
                            <i class="fas fa-save"></i> Simpan Nama
                        </button>
                    </form>
                </div>

                <div class="bg-amber-50 border border-amber-100 p-4 rounded-xl text-[11px] text-amber-700">
                    <p class="font-bold mb-1"><i class="fas fa-info-circle mr-1"></i> Informasi:</p>
                    Klik tombol hijau di atas untuk melihat riwayat kehadiran yang sudah terkirim ke Google Sheets.
                </div>
            </div>

            <!-- Kolom Daftar & Absensi -->
            <div class="md:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                        <h2 class="font-black text-gray-800 uppercase tracking-tighter">Daftar Hadir Sabtu</h2>
                        <span id="countDisplay" class="bg-blue-50 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">0 Anggota</span>
                    </div>

                    <div id="memberList" class="divide-y divide-gray-50 max-h-[500px] overflow-y-auto">
                        <div class="p-12 text-center text-gray-400 italic text-sm">
                            <div class="loading-spinner mx-auto mb-2"></div>
                            Memuat data anggota...
                        </div>
                    </div>

                    <div class="p-6 bg-gray-50 border-t flex justify-end">
                        <button id="syncAllBtn" class="bg-green-600 hover:bg-green-700 text-white font-black py-3 px-8 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-green-100 transition-all flex items-center gap-2">
                            <i class="fas fa-sync"></i> Kirim Ke Google Sheets
                        </button>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gereja-gsheets-v2';

        // URL Google Apps Script Anda
        const scriptURL = "https://script.google.com/macros/s/AKfycbw-A-0Dsw5tCC8Jb_Ufq3Fc0OsO7mLyUv1lOdLfJCcHH_V2-A50I-u56XaGWkadc9c-og/exec";

        let members = [];
        let currentUser = null;

        // Inisialisasi Autentikasi
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                document.getElementById('statusText').textContent = "Gagal Terhubung";
                document.getElementById('statusDot').className = "w-2 h-2 bg-red-500 rounded-full";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('statusText').textContent = "Mode Cloud Aktif";
                document.getElementById('statusDot').className = "w-2 h-2 bg-green-400 rounded-full animate-pulse";
                listenData();
            }
        });

        function listenData() {
            if (!currentUser) return;
            const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
            onSnapshot(membersRef, (snap) => {
                members = snap.docs.map(d => ({id: d.id, ...d.data()}));
                members.sort((a, b) => (a.name > b.name) ? 1 : -1);
                render();
            });
        }

        function render() {
            const listEl = document.getElementById('memberList');
            const countEl = document.getElementById('countDisplay');
            if (members.length === 0) {
                listEl.innerHTML = `<div class="p-12 text-center text-gray-300 italic text-sm">Belum ada nama terdaftar...</div>`;
                countEl.textContent = "0 Anggota";
                return;
            }
            countEl.textContent = `${members.length} Anggota`;
            listEl.innerHTML = members.map(m => `
                <div class="p-4 flex items-center justify-between hover:bg-gray-50 transition-all fade-in">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">
                            ${(m.name || 'U').charAt(0).toUpperCase()}
                        </div>
                        <span class="font-bold text-gray-700">${m.name}</span>
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" data-name="${m.name}" class="w-6 h-6 rounded border-gray-300 text-blue-600 checkbox-hadir">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Hadir</span>
                    </label>
                </div>
            `).join('');
        }

        document.getElementById('addMemberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('inputName');
            const btn = document.getElementById('addBtn');
            const name = input.value.trim();
            if (name && currentUser) {
                btn.disabled = true;
                btn.innerHTML = `<div class="loading-spinner"></div>`;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), {
                        name: name,
                        createdAt: serverTimestamp()
                    });
                    input.value = '';
                } catch (err) { alert("Error menyimpan nama."); }
                finally { btn.disabled = false; btn.innerHTML = `<i class="fas fa-save"></i> Simpan Nama`; }
            }
        });

        document.getElementById('syncAllBtn').addEventListener('click', async () => {
            const btn = document.getElementById('syncAllBtn');
            const checkboxes = document.querySelectorAll('.checkbox-hadir:checked');
            
            if (checkboxes.length === 0) {
                alert("Pilih minimal satu jemaat yang hadir.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="loading-spinner"></div> Mengirim...`;

            try {
                for (const check of checkboxes) {
                    const nama = check.dataset.name;
                    const params = new URLSearchParams();
                    params.append('nama', nama);
                    params.append('kegiatan', "Hadir Sekolah Sabat");

                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: params.toString()
                    });
                }
                
                alert("Puji Tuhan! Data kehadiran berhasil dikirim ke Google Sheets.");
                document.querySelectorAll('.checkbox-hadir').forEach(c => c.checked = false);
            } catch (e) {
                console.error("Fetch Error:", e);
                alert("Terjadi kesalahan saat menghubungi server Google.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-sync"></i> Kirim Ke Google Sheets`;
            }
        });

        initAuth();
    </script>
</body>
</html>
