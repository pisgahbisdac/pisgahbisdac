<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Kehadiran Jemaat - PISGAH BISDAC</title>
    <link rel="icon" type="image/png" href="./PisgahWhite.png">
    
    <!-- Memuat Tailwind CSS di awal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cca43b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #e5c158; }

        /* Hide scrollbar for mobile navigation */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* iOS Input Zoom Preventer */
        @media (max-width: 768px) {
            input[type="text"], input[type="password"], input[type="number"], 
            input[type="date"], input[type="month"], select, textarea {
                font-size: 16px !important;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Preloader Styles */
        #app-preloader {
            position: fixed; inset: 0; z-index: 99999;
            background-color: #050814;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #f59e0b; /* Amber 500 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen relative overflow-x-hidden bg-slate-50 dark:bg-[#050814] text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <!-- Preloader Instan -->
    <div id="app-preloader">
        <div class="spinner"></div>
        <h2 style="color: #f59e0b; font-weight: 800; font-size: 1.25rem; margin-top: 1.5rem; letter-spacing: 0.05em; font-family: 'Inter', sans-serif;">PISGAH BISDAC</h2>
        <p style="color: #64748b; font-size: 0.875rem; margin-top: 0.5rem; font-family: 'Inter', sans-serif;">Menyiapkan Sistem...</p>
    </div>

    <div class="fixed inset-0 bg-slate-100 dark:bg-[#040712] overflow-hidden -z-10 transition-colors duration-300">
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-blue-400/20 dark:bg-blue-900/15 blur-[140px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-amber-400/20 dark:bg-amber-500/10 blur-[140px]"></div>
    </div>

    <div id="root"></div>

    <!-- Script Library Berat Dipindah Ke Bawah (Mengoptimalkan Tampilan Awal) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwW-Km_huyHl-RZ18MSjVXTF46bNJGDb634-hqqhGCwRgV2VsCqx6vG3dmQSqStJhE-/exec";

        const KEGIATAN_KETERLIBATAN = [
            { id: 1, text: "Jumlah Anggota yang datang tepat waktu di Kebaktian Sekolah Sabat", autoFill: true },
            { id: 2, text: "Jumlah Anggota yang membaca Alkitab setiap hari", autoFill: false },
            { id: 3, text: "Jumlah Anggota yang Renungan Pagi setiap hari", autoFill: false },
            { id: 4, text: "Jumlah Anggota yang Belajar Sekolah Sabat setiap hari", autoFill: false },
            { id: 5, text: "Jumlah Anggota yang hadir di Kebaktian Rabu Malam", autoFill: false },
            { id: 6, text: "Jumlah Anggota yang melakukan Jangkauan Keluar (Discipleship)", autoFill: false },
            { id: 7, text: "Jumlah Anggota yang melakukan Perawatan Pemeliharaan (Nurturing & Reclaiming)", autoFill: false },
            { id: 8, text: "Jumlah Anggota yang melakukan Doa (777, 1752 & Doa Subuh)", autoFill: false },
            { id: 9, text: "Jumlah Anggota yang terlibat/mengadakan kegiatan Kelompok Kecil", autoFill: false },
            { id: 10, text: "Jumlah Anggota yang membagikan risalah, buku rohani, kursus Alkitab tertulis.", autoFill: false }
        ];

        const cleanDateString = (dateInput) => {
            if (!dateInput) return "";
            if (typeof dateInput === 'string') {
                if (dateInput.includes('T')) return dateInput.split('T')[0];
                return dateInput;
            }
            return "";
        };

        const formatLocalYYYYMMDD = (dateObj) => {
            if (!dateObj) return "";
            const year  = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day   = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const maskNoHp = (noHp) => {
            if (!noHp) return "-";
            const str = String(noHp).replace(/\s/g, "");
            if (str.length <= 4) return "****";
            const visible = str.slice(0, 4);
            const end     = str.slice(-2);
            const masked  = "*".repeat(Math.max(0, str.length - 6));
            return `${visible}${masked}${end}`;
        };

        const parseLocalDate = (dateStr) => {
            if (!dateStr) return null;
            const cleaned = cleanDateString(dateStr);
            const parts   = cleaned.split('-');
            if (parts.length !== 3) return null;
            return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        };

        const getSabbatsInMonth = (yearMonth) => {
            if (!yearMonth) return [];
            const [year, month] = yearMonth.split('-').map(Number);
            const sabbats = [];
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month - 1, d);
                if (date.getDay() === 6) {
                    sabbats.push(formatLocalYYYYMMDD(date));
                }
            }
            return sabbats;
        };

        function DashboardCharts({ jemaat, absen, tamuTambahan, subKelas, metrics, parseLocalDate, currentUserRole, isDarkMode }) {
            const trendRef    = useRef(null);
            const donutRef    = useRef(null);
            const ageRef      = useRef(null);
            const genderRef   = useRef(null);
            const subkelasRef = useRef(null);
            const chartsRef   = useRef({});
            const [trendMode, setTrendMode] = useState("jumlah");

            const PALETTE = ["#378ADD","#1D9E75","#BA7517","#D4537E","#7F77DD","#639922","#D85A30"];
            const gridColor = () => isDarkMode ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.08)";
            const textColor = () => isDarkMode ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.55)";
            const destroyChart = (key) => { if (chartsRef.current[key]) { chartsRef.current[key].destroy(); delete chartsRef.current[key]; } };

            const SUBKELAS_NAMES = subKelas.map(s => s.nama);

            const sabbatList = useMemo(() => {
                const dates = [...new Set(absen.filter(a => a.sesi === "Sekolah Sabat").map(a => a.tanggal))].sort();
                return dates.slice(-6);
            }, [absen]);

            const hadirPerSubPerSabbat = useMemo(() =>
                SUBKELAS_NAMES.map(sub =>
                    sabbatList.map(tgl =>
                        absen.filter(a => a.tanggal === tgl && a.sesi === "Sekolah Sabat" && a.status === "Hadir" &&
                            jemaat.find(j => j.nama === a.jemaatNama)?.subKelasNama === sub).length
                    )
                ), [sabbatList, absen, jemaat, subKelas]);

            const totalHadirPerSabbat = useMemo(() =>
                sabbatList.map((_, i) => hadirPerSubPerSabbat.reduce((sum, arr) => sum + (arr[i] || 0), 0)),
                [hadirPerSubPerSabbat, sabbatList]);

            const khotbahPerSabbat = useMemo(() =>
                sabbatList.map(tgl => absen.filter(a => a.tanggal === tgl && a.sesi === "Khotbah" && a.status === "Hadir").length),
                [sabbatList, absen]);

            const ageGroups = useMemo(() => {
                const groups = { "<12": 0, "12–17": 0, "18–25": 0, "26–35": 0, "36–50": 0, "51–65": 0, "66+": 0 };
                const now = new Date().getFullYear();
                jemaat.forEach(j => {
                    if (!j.tglLahir) return;
                    const age = now - parseInt(j.tglLahir.split("-")[0]);
                    if (age < 12) groups["<12"]++;
                    else if (age <= 17) groups["12–17"]++;
                    else if (age <= 25) groups["18–25"]++;
                    else if (age <= 35) groups["26–35"]++;
                    else if (age <= 50) groups["36–50"]++;
                    else if (age <= 65) groups["51–65"]++;
                    else groups["66+"]++;
                });
                return groups;
            }, [jemaat]);

            const genderBaptis = useMemo(() => ({
                lk_baptis: jemaat.filter(j => j.gender === "Laki-laki"  && j.statusBaptis === "Sudah Baptis").length,
                lk_belum:  jemaat.filter(j => j.gender === "Laki-laki"  && j.statusBaptis !== "Sudah Baptis").length,
                pr_baptis: jemaat.filter(j => j.gender === "Perempuan"  && j.statusBaptis === "Sudah Baptis").length,
                pr_belum:  jemaat.filter(j => j.gender === "Perempuan"  && j.statusBaptis !== "Sudah Baptis").length,
            }), [jemaat]);

            const memberAttendance = useMemo(() => {
                const last4 = sabbatList.slice(-4);
                return jemaat.map(j => ({
                    nama: j.nama,
                    hadir: last4.filter(tgl => absen.find(a => a.tanggal === tgl && a.jemaatNama === j.nama && a.sesi === "Sekolah Sabat" && a.status === "Hadir")).length,
                    total: last4.length,
                })).sort((a, b) => b.hadir - a.hadir);
            }, [jemaat, absen, sabbatList]);

            const trendLastDiff = totalHadirPerSabbat.length >= 2
                ? totalHadirPerSabbat[totalHadirPerSabbat.length-1] - totalHadirPerSabbat[totalHadirPerSabbat.length-2]
                : 0;

            useEffect(() => {
                if (!window.Chart || !trendRef.current || sabbatList.length === 0) return;
                destroyChart("trend");
                const labels = sabbatList.map(d => { const p = parseLocalDate(d); return p ? `${p.getDate()}/${p.getMonth()+1}` : d; });
                const pctSS = totalHadirPerSabbat.map(v => jemaat.length > 0 ? Math.round(v/jemaat.length*100) : 0);
                const pctKh = khotbahPerSabbat.map(v => jemaat.length > 0 ? Math.round(v/jemaat.length*100) : 0);
                let datasets = [];
                if (trendMode === "jumlah") {
                    datasets = [
                        { label: "Sekolah Sabat", data: totalHadirPerSabbat, borderColor: "#378ADD", backgroundColor: "rgba(55,138,221,0.12)", borderWidth: 2, pointRadius: 4, tension: 0.35, fill: true },
                        { label: "Khotbah", data: khotbahPerSabbat, borderColor: "#1D9E75", backgroundColor: "rgba(29,158,117,0.10)", borderWidth: 2, pointRadius: 4, tension: 0.35, fill: true, borderDash: [5,3] },
                    ];
                } else if (trendMode === "persen") {
                    datasets = [
                        { label: "SS (%)", data: pctSS, borderColor: "#378ADD", backgroundColor: "rgba(55,138,221,0.12)", borderWidth: 2, pointRadius: 4, tension: 0.35, fill: true },
                        { label: "Khotbah (%)", data: pctKh, borderColor: "#1D9E75", backgroundColor: "rgba(29,158,117,0.10)", borderWidth: 2, pointRadius: 4, tension: 0.35, fill: true, borderDash: [5,3] },
                    ];
                } else {
                    datasets = [
                        { label: "Hadir SS", data: totalHadirPerSabbat, type: "bar", backgroundColor: "rgba(55,138,221,0.6)", borderColor: "#378ADD", borderWidth: 1, yAxisID: "y" },
                        { label: "% Khotbah", data: pctKh, type: "line", borderColor: "#1D9E75", backgroundColor: "transparent", borderWidth: 2, pointRadius: 4, tension: 0.35, yAxisID: "y2", borderDash: [4,3] },
                    ];
                }
                const scalesObj = {
                    x: { grid: { color: gridColor() }, ticks: { color: textColor(), font: { size: 10 }, autoSkip: false } },
                    y: { grid: { color: gridColor() }, ticks: { color: textColor(), font: { size: 10 } }, beginAtZero: true }
                };
                if (trendMode === "combined") {
                    scalesObj.y2 = { position: "right", grid: { display: false }, ticks: { color: textColor(), font: { size: 10 }, callback: v => v+"%" }, beginAtZero: true, max: 100 };
                }
                chartsRef.current.trend = new Chart(trendRef.current, {
                    type: trendMode === "combined" ? "bar" : "line",
                    data: { labels, datasets },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: scalesObj }
                });
            }, [trendMode, sabbatList, totalHadirPerSabbat, khotbahPerSabbat, jemaat.length, isDarkMode]);

            useEffect(() => {
                if (!window.Chart || !donutRef.current) return;
                destroyChart("donut");
                const statusMap = {};
                jemaat.forEach(j => {
                    (j.statusJemaat || "Jemaat").split(",").map(s => s.trim()).forEach(s => { statusMap[s] = (statusMap[s] || 0) + 1; });
                });
                chartsRef.current.donut = new Chart(donutRef.current, {
                    type: "doughnut",
                    data: { labels: Object.keys(statusMap), datasets: [{ data: Object.values(statusMap), backgroundColor: PALETTE, borderWidth: 0, hoverOffset: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, cutout: "68%", plugins: { legend: { display: false } } }
                });
            }, [jemaat]);

            useEffect(() => {
                if (!window.Chart || !ageRef.current) return;
                destroyChart("age");
                chartsRef.current.age = new Chart(ageRef.current, {
                    type: "bar",
                    data: { labels: Object.keys(ageGroups), datasets: [{ data: Object.values(ageGroups), backgroundColor: PALETTE, borderWidth: 0, borderRadius: 3 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textColor(), font: { size: 10 } } }, y: { grid: { color: gridColor() }, ticks: { color: textColor(), font: { size: 10 } }, beginAtZero: true } } }
                });
            }, [ageGroups, isDarkMode]);

            useEffect(() => {
                if (!window.Chart || !genderRef.current) return;
                destroyChart("gender");
                const { lk_baptis, lk_belum, pr_baptis, pr_belum } = genderBaptis;
                chartsRef.current.gender = new Chart(genderRef.current, {
                    type: "bar",
                    data: { labels: ["Laki-laki","Perempuan"], datasets: [
                        { label: "Sudah baptis", data: [lk_baptis, pr_baptis], backgroundColor: "#1D9E75", borderWidth: 0, borderRadius: 3 },
                        { label: "Belum baptis", data: [lk_belum, pr_belum],   backgroundColor: "#E24B4A", borderWidth: 0, borderRadius: 3 },
                    ]},
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textColor(), font: { size: 11 } } }, y: { grid: { color: gridColor() }, ticks: { color: textColor(), font: { size: 10 } }, beginAtZero: true } } }
                });
            }, [genderBaptis, isDarkMode]);

            useEffect(() => {
                if (!window.Chart || !subkelasRef.current || SUBKELAS_NAMES.length === 0) return;
                destroyChart("subkelas");
                const last4 = sabbatList.slice(-4);
                const labels = last4.map(d => { const p = parseLocalDate(d); return p ? `${p.getDate()}/${p.getMonth()+1}` : d; });
                chartsRef.current.subkelas = new Chart(subkelasRef.current, {
                    type: "bar",
                    data: { labels, datasets: SUBKELAS_NAMES.map((sub, i) => ({
                        label: sub, data: hadirPerSubPerSabbat[i]?.slice(-4) || [],
                        backgroundColor: PALETTE[i % PALETTE.length], borderWidth: 0, borderRadius: 3,
                    }))},
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textColor(), font: { size: 10 } } }, y: { grid: { color: gridColor() }, ticks: { color: textColor(), font: { size: 10 } }, beginAtZero: true } } }
                });
            }, [sabbatList, hadirPerSubPerSabbat, subKelas, isDarkMode]);

            useEffect(() => { return () => { Object.values(chartsRef.current).forEach(c => c.destroy()); }; }, []);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        {[
                            { label: "Hadir SS Terakhir", val: totalHadirPerSabbat[totalHadirPerSabbat.length-1] || 0, sub: `${jemaat.length > 0 ? Math.round((totalHadirPerSabbat[totalHadirPerSabbat.length-1]||0)/jemaat.length*100) : 0}% dari total`, diff: trendLastDiff },
                            { label: "Hadir Khotbah",     val: khotbahPerSabbat[khotbahPerSabbat.length-1] || 0,     sub: "Sabat terakhir" },
                            { label: "Rata-rata Hadir SS", val: totalHadirPerSabbat.length > 0 ? Math.round(totalHadirPerSabbat.reduce((a,b)=>a+b,0)/totalHadirPerSabbat.length) : 0, sub: `${sabbatList.length} Sabat terakhir` },
                            { label: "Tamu Sabat Ini",    val: tamuTambahan.filter(t => t.tanggal === sabbatList[sabbatList.length-1] && t.sesi === "Sekolah Sabat").reduce((s,t)=>s+t.jumlah,0), sub: "semua sub-kelas" },
                        ].map((m, i) => (
                            <div key={i} className="bg-white/80 dark:bg-slate-900/60 border border-slate-200 dark:border-white/5 p-4 rounded-xl flex flex-col justify-between shadow-sm">
                                <p className="text-slate-500 dark:text-slate-500 text-[10px] md:text-[9px] font-black uppercase tracking-wider mb-1 leading-tight">{m.label}</p>
                                <div>
                                    <p className="text-2xl md:text-xl font-black text-slate-900 dark:text-white">{m.val}</p>
                                    <p className="text-[11px] md:text-[10px] text-slate-500 mt-0.5">{m.sub}</p>
                                    {m.diff !== undefined && (
                                        <span className={`text-[11px] md:text-[10px] font-bold ${m.diff >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}`}>
                                            {m.diff >= 0 ? "↑" : "↓"} {Math.abs(m.diff)} vs sebelumnya
                                        </span>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-white/10 p-4 md:p-5 rounded-2xl shadow-xl backdrop-blur">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                            <div>
                                <h4 className="font-extrabold text-slate-900 dark:text-white text-sm md:text-xs uppercase tracking-wider"><i className="fa-solid fa-chart-simple text-amber-500 dark:text-amber-400 mr-1 animate-pulse"></i> Tren Kehadiran</h4>
                                <p className="text-xs md:text-[10px] text-slate-500 mt-0.5">{sabbatList.length} Sabat terakhir · SS & Khotbah</p>
                            </div>
                            <div className="flex gap-1 text-[11px] md:text-[10px] font-black w-full sm:w-auto">
                                {[["jumlah","Jumlah"],["persen","Persen"],["combined","Mix"]].map(([key, label]) => (
                                    <button key={key} onClick={() => setTrendMode(key)}
                                        className={`flex-1 sm:flex-none px-3 py-2 md:py-1.5 rounded-lg transition text-center border dark:border-transparent ${trendMode === key ? "bg-amber-500 border-amber-600 text-slate-950" : "bg-slate-100 dark:bg-slate-800 border-slate-300 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white"}`}>
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div style={{ position:"relative", height:"220px" }}><canvas ref={trendRef}></canvas></div>
                        <div className="flex flex-wrap gap-4 mt-4 md:mt-3">
                            {[["#378ADD","Sekolah Sabat"],["#1D9E75","Khotbah"]].map(([c, l]) => (
                                <span key={l} className="flex items-center gap-2 md:gap-1.5 text-xs md:text-[11px] text-slate-600 dark:text-slate-400">
                                    <span style={{ width:12, height:12, borderRadius:3, background:c, display:"inline-block" }}></span>{l}
                                </span>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-white/10 p-4 md:p-5 rounded-2xl shadow-xl backdrop-blur">
                        <h4 className="font-extrabold text-slate-900 dark:text-white text-sm md:text-xs mb-1 uppercase tracking-wider"><i className="fa-solid fa-layer-group text-amber-500 dark:text-amber-400 mr-1"></i> Kehadiran per Sub-Kelas</h4>
                        <p className="text-xs md:text-[10px] text-slate-500 mb-4">4 Sabat terakhir</p>
                        <div style={{ position:"relative", height:"200px" }}><canvas ref={subkelasRef}></canvas></div>
                        <div className="flex flex-wrap gap-3 mt-4 md:mt-3">
                            {SUBKELAS_NAMES.map((s, i) => (
                                <span key={s} className="flex items-center gap-2 md:gap-1.5 text-xs md:text-[11px] text-slate-600 dark:text-slate-400">
                                    <span style={{ width:12, height:12, borderRadius:3, background:PALETTE[i%PALETTE.length], display:"inline-block" }}></span>{s}
                                </span>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

                            </div>

                        <div className="bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-white/10 p-4 md:p-5 rounded-2xl shadow-xl backdrop-blur">

                        <div className="bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-white/10 p-4 md:p-5 rounded-2xl shadow-xl backdrop-blur">
                            <h4 className="font-extrabold text-slate-900 dark:text-white text-sm md:text-xs mb-1 uppercase tracking-wider"><i className="fa-solid fa-venus-mars text-amber-500 dark:text-amber-400 mr-1"></i> Gender & Baptis</h4>
                            <p className="text-xs md:text-[10px] text-slate-500 mb-4">Laki-laki vs Perempuan</p>
                            <div style={{ position:"relative", height:"180px" }}><canvas ref={genderRef}></canvas></div>
                            <div className="flex gap-4 mt-4 md:mt-3">
                                {[["#1D9E75","Sudah baptis"],["#E24B4A","Belum baptis"]].map(([c, l]) => (

                    </div>

                    {currentUserRole !== "public" && (
                    <div className="bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-white/10 p-4 md:p-5 rounded-2xl shadow-xl backdrop-blur">
                        <h4 className="font-extrabold text-slate-900 dark:text-white text-sm md:text-xs mb-1 uppercase tracking-wider">
                            <i className="fa-solid fa-user-check text-amber-500 dark:text-amber-400 mr-1"></i> Kehadiran per Anggota
                        </h4>
                        <p className="text-xs md:text-[10px] text-slate-500 mb-4">4 Sabat terakhir · SS saja</p>
                        <div className="space-y-3 md:space-y-2 max-h-72 overflow-y-auto pr-1">
                            {memberAttendance.map((m) => {
                                const pct = m.total > 0 ? Math.round(m.hadir / m.total * 100) : 0;
                                const color = pct >= 100 ? "#1D9E75" : pct >= 50 ? "#BA7517" : "#E24B4A";
                                return (
                                    <div key={m.nama} className="flex items-center gap-3 md:gap-2 text-xs md:text-[11px]">
                                        <span className="text-slate-600 dark:text-slate-400 w-[110px] md:w-[120px] text-right shrink-0 truncate">{m.nama}</span>
                                        <div className="flex-1 bg-slate-200 dark:bg-slate-950 h-3 md:h-2.5 rounded-full overflow-hidden">
                                            <div className="h-full rounded-full" style={{ width:`${pct}%`, background:color }}></div>
                                        </div>
                                        <span className="font-bold text-slate-900 dark:text-white w-8 text-right shrink-0">{m.hadir}/{m.total}</span>
                                        <span className="text-xs md:text-[10px] font-bold w-8 shrink-0" style={{ color }}>{pct}%</span>
                                    </div>
                                );
                            })}
                            {memberAttendance.length === 0 && <p className="text-slate-500 text-xs md:text-xs italic text-center py-6">Belum ada data absen.</p>}
                        </div>
                    </div>
                )}
            </div>
        );
        }

        function App() {
            // Tampilan Loading Screen (Menghilangkan layar blank di awal)
            useEffect(() => {
                const preloader = document.getElementById('app-preloader');
                if (preloader) {
                    setTimeout(() => {
                        preloader.style.opacity = '0';
                        setTimeout(() => preloader.remove(), 500);
                    }, 200);
                }
            }, []);

            const [isDarkMode, setIsDarkMode] = useState(() => {
                if (typeof window !== 'undefined') {
                    const stored = localStorage.getItem('theme');
                    if (stored) return stored === 'dark';
                    return window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
                return true;
            });

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            const [jemaat, setJemaat]               = useState([]);
            const [kelas, setKelas]                 = useState([]);
            const [subKelas, setSubKelas]           = useState([]);
            const [users, setUsers]                 = useState([]);
            const [absen, setAbsen]                 = useState([]);
            const [keterlibatan, setKeterlibatan]   = useState([]);
            const [tamuTambahan, setTamuTambahan]   = useState([]);
            const [doaList, setDoaList]             = useState([]);
            const [adminPin, setAdminPin]           = useState("admin123");

            const [showAdminPinForm, setShowAdminPinForm] = useState(false);
            const [showUserModalPin, setShowUserModalPin] = useState(false);
            const [logoError, setLogoError]         = useState(false);
            const [isSyncing, setIsSyncing]         = useState(false);

            const [currentUserRole, setCurrentUserRole] = useState("public");
            const [loggedInUser, setLoggedInUser]   = useState(null);
            const [adminPassword, setAdminPassword] = useState("");
            const [activeTab, setActiveTab]         = useState("dashboard");
            const [authError, setAuthError]         = useState("");
            const [showLoginPassword, setShowLoginPassword] = useState(false);

            const [jemaatModal, setJemaatModal] = useState({ isOpen: false, mode: 'create', data: null });
            const [kelasModal,  setKelasModal]  = useState({ isOpen: false, mode: 'create', data: null, type: 'kelas' });
            const [userModal,   setUserModal]   = useState({ isOpen: false, mode: 'create', data: null });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: "", message: "", onConfirm: null });

            const [searchJemaat,  setSearchJemaat]  = useState("");
            const [filterKelas,   setFilterKelas]   = useState("all");
            const [filterGender,  setFilterGender]  = useState("all");
            const [filterBaptis,  setFilterBaptis]  = useState("all");
            const [sortBy,    setSortBy]    = useState("nama");
            const [sortOrder, setSortOrder] = useState("asc");

            const getTodayString = () => formatLocalYYYYMMDD(new Date());
            const [selectedSabbatDate,   setSelectedSabbatDate]   = useState(getTodayString());
            const [absenDraft,           setAbsenDraft]           = useState({});
            const [selectedSubKelasNama, setSelectedSubKelasNama] = useState("");
            const [selectedSession,      setSelectedSession]      = useState("Sekolah Sabat");
            const [schoolSabbatSubTab,   setSchoolSabbatSubTab]   = useState("absen-jemaat");
            const [keterlibatanDraft,    setKeterlibatanDraft]    = useState({});
            const [tamuDraft,            setTamuDraft]            = useState(0);
            const [searchSermonJemaat,   setSearchSermonJemaat]   = useState("");

            const [reportMonth,         setReportMonth]         = useState("2026-05");
            const [reportKelasFilter,   setReportKelasFilter]   = useState("all");
            const [reportSession,       setReportSession]       = useState("Sekolah Sabat");
            const [reportType,          setReportType]          = useState("presensi");
            const [reportSubKelasFilter,setReportSubKelasFilter]= useState("");
            const [reportMonthEnd,      setReportMonthEnd]      = useState("2026-05");
            const [isMultiMonth,        setIsMultiMonth]        = useState(false);

            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 4000);
            };

            const triggerConfirm = (title, message, onConfirmCallback) => {
                setConfirmModal({
                    isOpen: true, title, message,
                    onConfirm: () => {
                        onConfirmCallback();
                        setConfirmModal({ isOpen: false, title: "", message: "", onConfirm: null });
                    }
                });
            };

            const ultahBulanIni = useMemo(() => {
                const currentMonth = new Date().getMonth() + 1;
                return jemaat.filter(j => {
                    if (!j.tglLahir) return false;
                    const parts = j.tglLahir.split('-');
                    return parts.length === 3 && parseInt(parts[1]) === currentMonth;
                }).sort((a, b) => parseInt(a.tglLahir.split('-')[2]) - parseInt(b.tglLahir.split('-')[2]));
            }, [jemaat]);

            const ultahBulanLalu = useMemo(() => {
                const now = new Date();
                let lastMonth = now.getMonth();
                let year = now.getFullYear();
                if (lastMonth === 0) { lastMonth = 11; year--; } else { lastMonth--; }
                const targetMonth = lastMonth + 1;
                return jemaat.filter(j => {
                    if (!j.tglLahir) return false;
                    const parts = j.tglLahir.split('-');
                    return parts.length === 3 && parseInt(parts[1]) === targetMonth;
                }).sort((a, b) => parseInt(a.tglLahir.split('-')[2]) - parseInt(b.tglLahir.split('-')[2]));
            }, [jemaat]);

            const pushDataToCloud = async (overrideData = {}, overrideAdminPin = null) => {
                if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("ISI_DENGAN_URL")) return;
                setIsSyncing(true);
                showToast("Menyimpan ke Cloud...", "info");
                try {
                    const activeAdminPin = overrideAdminPin !== null ? overrideAdminPin : adminPin;
                    const payload = {};
                    if (overrideData.jemaat !== undefined) payload.jemaat = overrideData.jemaat.map(j => ({ ...j, tglLahir: cleanDateString(j.tglLahir) }));
                    if (overrideData.kelas !== undefined) payload.kelas = overrideData.kelas;
                    if (overrideData.subKelas !== undefined) payload.subKelas = overrideData.subKelas;
                    if (overrideData.users !== undefined || overrideAdminPin !== null) {
                        payload.users = [...(overrideData.users || users), { nama: "Admin Utama (Backup PIN)", subKelasNama: "Kebaktian Khotbah (Umum)", pin: activeAdminPin }];
                    }
                    if (overrideData.absen !== undefined) payload.absen = overrideData.absen;
                    if (overrideData.keterlibatan !== undefined) payload.keterlibatan = overrideData.keterlibatan;
                    if (overrideData.tamuTambahan !== undefined) payload.tamuTambahan = overrideData.tamuTambahan;
                    if (overrideData.doaList !== undefined) payload.doaList = overrideData.doaList;

                    const res = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST', redirect: 'follow',
                        body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const json = await res.json();
                    if (json.success) showToast("Data tersimpan di Database Cloud!", "success");
                    else showToast("Gagal menyimpan: " + json.error, "error");
                } catch (err) {
                    showToast("Gagal terhubung ke Cloud. Tersimpan di lokal.", "warning");
                } finally { setIsSyncing(false); }
            };

            // Fungsi Helper untuk memproses Data JSON menjadi State React
            const processAndSetData = (d) => {
                if (d.jemaat) setJemaat(d.jemaat.map((j, idx) => ({ ...j, id: j.id || `J_${Date.now()}_${idx}_${Math.random().toString(36).substr(2, 4)}`, tglLahir: cleanDateString(j.tglLahir) })));
                if (d.kelas) setKelas(d.kelas);
                if (d.subKelas) setSubKelas(d.subKelas);
                if (d.users) {
                    const adminRecord = d.users.find(u => u.nama === "Admin Utama (Backup PIN)");
                    if (adminRecord) setAdminPin(adminRecord.pin);
                    setUsers(d.users.filter(u => u.nama !== "Admin Utama (Backup PIN)"));
                }
                if (d.absen) {
                    const rawAbsen = d.absen.map(a => ({ ...a, tanggal: cleanDateString(a.tanggal) }));
                    const jSubMap = {};
                    if (d.jemaat) d.jemaat.forEach(j => { if (j.nama) jSubMap[j.nama] = j.subKelasNama; });
                    
                    const absenBiasa = rawAbsen.filter(a => a.jemaatNama !== "Tamu Tambahan");
                    const tamuRows   = rawAbsen.filter(a => a.jemaatNama === "Tamu Tambahan" && (parseInt(a.status) || 0) > 0);

                    const subKelasOrder = (d.subKelas || []).map(s => s.nama);
                    const activeSubs = {};
                    for (const a of absenBiasa) {
                        if (a.sesi !== "Sekolah Sabat") continue;
                        const key = a.tanggal;
                        if (!activeSubs[key]) activeSubs[key] = new Set();
                        const sub = jSubMap[a.jemaatNama];
                        if (sub) activeSubs[key].add(sub);
                    }

                    const tamuSSByDate = {};
                    const resolvedTamu = [];

                    for (const t of tamuRows) {
                        const jumlah = parseInt(t.status) || 0;
                        if (t.sesi === "Khotbah") resolvedTamu.push({ tanggal: t.tanggal, sesi: "Khotbah", subKelasNama: "Kebaktian Khotbah (Umum)", jumlah });
                        else if (t.subKelasNama && t.subKelasNama !== "_ALL_") resolvedTamu.push({ tanggal: t.tanggal, sesi: t.sesi, subKelasNama: t.subKelasNama, jumlah });
                        else {
                            if (!tamuSSByDate[t.tanggal]) tamuSSByDate[t.tanggal] = [];
                            tamuSSByDate[t.tanggal].push(jumlah);
                        }
                    }

                    for (const [tgl, jumlahList] of Object.entries(tamuSSByDate)) {
                        const activeForDate = subKelasOrder.filter(s => activeSubs[tgl] && activeSubs[tgl].has(s));
                        if (activeForDate.length === jumlahList.length) {
                            jumlahList.forEach((jumlah, i) => { if (jumlah > 0) resolvedTamu.push({ tanggal: tgl, sesi: "Sekolah Sabat", subKelasNama: activeForDate[i], jumlah }); });
                        } else {
                            activeForDate.forEach((subNama, i) => {
                                const jumlah = jumlahList[i] !== undefined ? jumlahList[i] : jumlahList[0];
                                if (jumlah > 0) resolvedTamu.push({ tanggal: tgl, sesi: "Sekolah Sabat", subKelasNama: subNama, jumlah });
                            });
                        }
                    }
                    setAbsen(absenBiasa); setTamuTambahan(resolvedTamu);
                }
                if (d.keterlibatan) setKeterlibatan(d.keterlibatan.map(k => ({ ...k, tanggal: cleanDateString(k.tanggal) })));
                if (d.doaList) setDoaList(d.doaList.map(doa => ({ ...doa, tanggal: cleanDateString(doa.tanggal) || doa.tanggal, permohonan: (doa.permohonan || "").replace(/ \| /g, "\n").replace(/\|/g, "\n") })).sort((a, b) => Number(String(b.id || "").replace("D", "")) - Number(String(a.id || "").replace("D", ""))));
            };

            const handlePullFromCloud = async (silent = false) => {
                if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("ISI_DENGAN_URL")) return;

                // FITUR SPEED BOOST: Load dari Memory Local (Cache) terlebih dahulu jika ada
                if (!silent && jemaat.length === 0) {
                    try {
                        const cached = localStorage.getItem('pisgah_data_cache');
                        if (cached) { processAndSetData(JSON.parse(cached)); }
                    } catch(e) {}
                }

                setIsSyncing(true);
                if (!silent) showToast("Sinkronisasi... Menarik data terbaru", "info");
                try {
                    const bypassUrl = `${APPS_SCRIPT_URL}?_=${Date.now()}`;
                    const res  = await fetch(bypassUrl);
                    const json = await res.json();
                    if (json.success && json.data) {
                        processAndSetData(json.data);
                        // Simpan data terbaru ke Memory Local (Cache)
                        localStorage.setItem('pisgah_data_cache', JSON.stringify(json.data));
                        if (!silent) showToast("Sinkronisasi Berhasil!", "success");
                    }
                } catch (err) {
                    if (!silent) showToast("Gagal memuat dari Cloud.", "error");
                } finally { setIsSyncing(false); }
            };

            useEffect(() => { if (!userModal.isOpen) setShowUserModalPin(false); }, [userModal.isOpen]);
            useEffect(() => { handlePullFromCloud(false); }, []);
            useEffect(() => { if (currentUserRole !== "public") handlePullFromCloud(true); }, [selectedSabbatDate]);

            const handleLogin = (e) => {
                e.preventDefault();
                const inputPin = adminPassword.trim(), activeAdminPin = String(adminPin).trim();
                if (inputPin === activeAdminPin) {
                    setCurrentUserRole("admin"); setLoggedInUser(null);
                    setAuthError(""); setAdminPassword(""); setShowLoginPassword(false);
                    setActiveTab("dashboard"); showToast("Login Admin Berhasil!", "success");
                } else {
                    const matchedUser = users.find(u => String(u.pin).trim() === inputPin);
                    if (matchedUser) {
                        setCurrentUserRole("user"); setLoggedInUser(matchedUser);
                        setAuthError(""); setAdminPassword(""); setShowLoginPassword(false);
                        setSelectedSubKelasNama(matchedUser.subKelasNama); setActiveTab("input-absen");
                        showToast(`Selamat datang ${matchedUser.nama}! Anda bertugas di ${matchedUser.subKelasNama}.`, "success");
                    } else {
                        setAuthError("Sandi Admin atau PIN salah!"); showToast("PIN atau Sandi salah!", "error");
                    }
                }
            };

            const handleLogout = () => {
                setCurrentUserRole("public"); setLoggedInUser(null); setActiveTab("dashboard");
                setAdminPassword(""); setShowLoginPassword(false); showToast("Anda telah keluar.", "info");
            };

            useEffect(() => {
                if (currentUserRole === "user" && loggedInUser) {
                    setSelectedSubKelasNama(loggedInUser.subKelasNama);
                    if (loggedInUser.subKelasNama === "Kebaktian Khotbah (Umum)") setSelectedSession("Khotbah");
                    else setSelectedSession("Sekolah Sabat");
                } else if (subKelas.length > 0 && !selectedSubKelasNama) {
                    setSelectedSubKelasNama(subKelas[0].nama);
                }
            }, [subKelas, selectedSubKelasNama, currentUserRole, loggedInUser]);

            useEffect(() => { if (subKelas.length > 0 && !reportSubKelasFilter) setReportSubKelasFilter(subKelas[0].nama); }, [subKelas, reportSubKelasFilter]);

            const isSabbat = (dateString) => { const date = parseLocalDate(dateString); return date ? date.getDay() === 6 : false; };

            const getSabbatsInRange = (monthStart, monthEnd, isMulti) => {
                if (!isMulti) return getSabbatsInMonth(monthStart);
                const [sy, sm] = monthStart.split('-').map(Number);
                const [ey, em] = monthEnd.split('-').map(Number);
                if (ey < sy || (ey === sy && em < sm)) return getSabbatsInMonth(monthStart);
                const sabbats = [];
                let cy = sy, cm = sm;
                while (cy < ey || (cy === ey && cm <= em)) {
                    const month = String(cm).padStart(2, '0');
                    getSabbatsInMonth(`${cy}-${month}`).forEach(s => sabbats.push(s));
                    cm++; if (cm > 12) { cm = 1; cy++; }
                }
                return sabbats;
            };

            const lastSabbaths = useMemo(() => {
                const dates = [...new Set(absen.filter(a => a.sesi === "Sekolah Sabat").map(a => a.tanggal))];
                return dates.sort().slice(-5);
            }, [absen]);

            const saveJemaat = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const subNama = fd.get('subKelasNama');
                const subK = subKelas.find(s => s.nama === subNama);
                const kelNama = subK ? subK.kelasNama : (subNama === "Kebaktian Khotbah (Umum)" ? "UMUM" : (kelas[0]?.nama || ""));
                const statusArray = fd.getAll('statusJemaat');
                const generatedId = jemaatModal.mode === 'create' ? "J" + Date.now().toString().slice(-4) : jemaatModal.data.id;
                
                const newJemaatData = {
                    id: generatedId, nama: fd.get('nama').trim(), gender: fd.get('gender'),
                    tglLahir: cleanDateString(fd.get('tglLahir')), statusBaptis: fd.get('statusBaptis'),
                    statusJemaat: statusArray.length > 0 ? statusArray.join(', ') : 'Jemaat',
                    kelasNama: kelNama, subKelasNama: subNama,
                };
                if (!newJemaatData.nama || !newJemaatData.subKelasNama) { showToast("Mohon lengkapi field nama dan sub-kelas!", "error"); return; }

                const isNameTaken = jemaat.some(j => j.nama.toLowerCase() === newJemaatData.nama.toLowerCase() && (jemaatModal.mode === 'create' || j.id !== generatedId));

                                                                    <td className="px-4 md:px-3 py-3 text-slate-700 dark:text-slate-300 border-r border-slate-200 dark:border-white/5 max-w-[250px] md:max-w-[200px] text-[11px] md:text-[10px] leading-relaxed whitespace-pre-wrap">{row.kegiatan}</td>
                                                                    {row.statusList.map((val, i) => (
                                                                        <td key={i} className="px-4 md:px-3 py-3 text-center font-black text-teal-600 dark:text-teal-400 border-r border-slate-200 dark:border-white/5 whitespace-nowrap">{val}</td>
                                                                    ))}
                                                                    <td className="px-4 md:px-3 py-3 text-center font-black text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-500/10 border-l border-amber-200 dark:border-amber-500/20">{row.total}</td>
                                                                </tr>
                                                            ))
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </section>
                        )}
                    </main>

                    {}

                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full border border-slate-300 dark:border-slate-700/50 p-1 bg-slate-100 dark:bg-slate-900"><img src="./PisgahWhite.png" alt="Logo" className="w-full h-full object-contain" onError={(e) => e.target.style.display = 'none'} /></div>
                                <h5 className="text-slate-900 dark:text-white font-black tracking-widest text-[11px]">PISGAH BISDAC</h5>
                            </div>
                            <p className="text-[10px] uppercase font-bold tracking-wider text-slate-500">&copy; 2026 Hak Cipta Dilindungi. Sistem Presensi Cloud.</p>
                        </div>
                    </footer>

                    <button onClick={() => handlePullFromCloud(false)} disabled={isSyncing} title={isSyncing ? "Menyinkronkan..." : "Sinkronisasi Data"}
                        className={`fixed z-50 flex items-center justify-center p-3.5 md:p-3 rounded-full text-lg md:text-base font-black shadow-2xl transition-all duration-200 border backdrop-blur-md bottom-6 md:bottom-8 right-4 md:right-8 ${
                            isSyncing ? "bg-slate-200 dark:bg-slate-900/80 border-slate-300 dark:border-slate-700/40 text-slate-400 cursor-not-allowed" : "bg-amber-500 border-amber-600 dark:border-amber-400 text-white dark:text-slate-950 hover:bg-amber-600 dark:hover:bg-amber-400 active:scale-90 shadow-amber-500/30"
                        }`}
                    >
                        <i className={`fa-solid fa-rotate ${isSyncing ? "fa-spin" : ""}`}></i>
                    </button>

                    {}
                    {jemaatModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-[100] p-4">

                                                <option value="" disabled hidden>Pilih Kelas...</option>
                                                <option value="Kebaktian Khotbah (Umum)">Khotbah (Umum)</option>

                                    <div className="flex justify-end gap-3 pt-4 border-t border-slate-200 dark:border-white/5">

                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-white dark:text-slate-950 font-black px-6 py-3 rounded-xl transition active:scale-95 text-sm shadow-lg shadow-amber-500/20"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Simpan PIN</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                                <form onSubmit={saveKelasOrSubKelas} className="space-y-4">

                                        <div><label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Nama Kelas Induk *</label><input type="text" name="namaKelas" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.nama : ''} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 p-3 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-amber-500 text-base md:text-sm" placeholder="Contoh: Dewasa" /></div>

                                        <>
                                            <div><label className="block text-slate-500 dark:text-slate-400 mb-1.5 text-xs font-bold uppercase tracking-wider">Nama Sub-Kelas *</label><input type="text" name="namaSubKelas" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.nama : ''} className="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 p-3 text-slate-900 dark:text-white rounded-xl focus:outline-none focus:border-amber-500 text-base md:text-sm" placeholder="Contoh: Dewasa 1" /></div>

                                                <select name="parentKelasNama" required defaultValue={kelasModal.mode === 'edit' ? kelasModal.data.kelasNama : ''} className="w-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white p-3 rounded-xl border border-slate-300 dark:border-slate-700 text-base md:text-sm focus:outline-none focus:border-amber-500">
                                                    <option value="" disabled hidden>Pilih Kelas Induk...</option>
                                                    {kelas.map(k => <option key={k.nama} value={k.nama}>{k.nama}</option>)}

                                        <button type="submit" className="bg-amber-500 hover:bg-amber-400 text-white dark:text-slate-950 font-black px-6 py-3 rounded-xl transition active:scale-95 text-sm shadow-lg shadow-amber-500/20"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Simpan Data</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
